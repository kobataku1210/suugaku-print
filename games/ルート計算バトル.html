<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ルート計算バトル</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #0e1430; }
  body { font-family: 'Hiragino Sans', 'Meiryo', 'Yu Gothic', sans-serif; color: #fff; }
  #app { position: relative; width: 100%; min-height: 100%; max-width: 720px; margin: 0 auto; }

  .screen { display: none; flex-direction: column; padding: 16px; min-height: 100vh; }
  .screen.active { display: flex; }

  /* タイトル */
  #title-screen { align-items: center; justify-content: center; gap: 18px; text-align: center; }
  .title-logo { font-size: clamp(30px, 7vw, 48px); font-weight: 900; letter-spacing: 2px;
    background: linear-gradient(90deg,#ffd200,#ff5577); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .title-sub { font-size: 14px; color: #bcd; border-top: 2px solid #ff5577; border-bottom: 2px solid #ff5577; padding: 4px 14px; }
  .title-desc { font-size: 13px; color: #9ab; line-height: 1.8; max-width: 360px; }
  .btn { border: none; border-radius: 999px; font-weight: 800; cursor: pointer; letter-spacing: 1px;
    transition: transform .1s; font-family: inherit; }
  .btn:active { transform: scale(.96); }
  .btn-start { background: linear-gradient(135deg,#ff5577,#c8265a); color:#fff; font-size: 22px; padding: 16px 56px; box-shadow: 0 6px 18px rgba(200,38,90,.5); }
  .btn-home { background: #ffffff22; color:#fff; font-size: 13px; padding: 9px 22px; border: 1px solid #ffffff33; }

  /* ステージ選択 */
  #select-screen { align-items: center; justify-content: center; gap: 14px; }
  .select-head { text-align:center; }
  .stage-list { display:flex; flex-direction:column; gap:10px; width:100%; max-width:380px; }
  .stage-item { display:flex; align-items:center; gap:14px; text-align:left; width:100%;
    background:linear-gradient(135deg,#1b2a5e,#16204a); color:#fff; border:1px solid #ffffff22;
    border-radius:14px; padding:12px 16px; font-family:inherit; cursor:pointer; transition:transform .1s; }
  .stage-item:active { transform:scale(.97); }
  .stage-item.locked { opacity:.45; cursor:not-allowed; background:#10162e; }
  .stage-item.cleared { border-color:#ffd200aa; box-shadow:0 0 0 1px #ffd20055; }
  .st-emoji { font-size:34px; line-height:1; width:40px; text-align:center; }
  .st-text { font-size:14px; font-weight:700; line-height:1.5; }
  .st-text b { font-size:17px; color:#ffd200; }

  /* バトル */
  #battle-screen { gap: 12px; }
  .enemy-card { background: linear-gradient(180deg,#16204a,#0d1530); border-radius: 16px; padding: 14px; box-shadow: inset 0 0 0 1px #ffffff14; }
  .enemy-top { display:flex; justify-content: space-between; align-items: center; font-size: 13px; color:#bcd; font-weight:700; }
  .hpbar { height: 14px; background:#06112a; border-radius: 999px; overflow:hidden; margin: 6px 0 4px; }
  .hpbar-fill { height: 100%; background: linear-gradient(90deg,#ff5577,#ffb35c); transition: width .35s; }
  .enemy-emoji { text-align: center; font-size: 64px; line-height: 1.1; margin: 6px 0; transition: transform .12s; }
  .enemy-emoji.hit { animation: enemyHit .4s; }
  @keyframes enemyHit { 0%{transform:translateX(0) scale(1);} 25%{transform:translateX(-10px) scale(1.08); filter:brightness(2);} 75%{transform:translateX(10px);} 100%{transform:translateX(0);} }
  .enemy-emoji.defeated { animation: enemyDie .6s forwards; }
  @keyframes enemyDie { to { transform: scale(.2) rotate(40deg); opacity: 0; } }

  .player-row { display:flex; justify-content: space-between; align-items:center; font-size: 13px; }
  .hearts { font-size: 22px; letter-spacing: 3px; color:#ff5577; }
  .enemy-hearts { text-align:center; font-size: 20px; letter-spacing: 2px; color:#ff8a5c; margin: 6px 0 2px; line-height: 1.2; }
  .stage-tag { font-size: 12px; color:#9ab; }

  .q-card { background: #fbf7ec; color:#222; border-radius: 16px; padding: 18px 14px; text-align:center; }
  .q-type { font-size: 12px; color:#888; font-weight:700; margin-bottom: 6px; }
  .q-text { font-size: clamp(24px, 6vw, 34px); font-weight: 900; font-family: 'Times New Roman', serif; min-height: 44px; }
  .q-text .small { font-size: .6em; color:#666; font-weight:700; font-family: 'Hiragino Sans', sans-serif; }
  /* 分数表記（有理化用：分子が上・分母が下） */
  .frac { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 4px; }
  .frac .num { padding:0 8px 2px; }
  .frac .den { padding:3px 8px 0; border-top:3px solid currentColor; }

  .choices { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .ans-hint { font-size: 13px; color:#bcd; text-align:center; }
  .ans-hint.hint-tip { font-size: 14px; color:#ffd200; font-weight:700; line-height:1.5; max-width: 340px; }
  .ans-row { display:flex; align-items:center; justify-content:center; gap: 10px; }
  .ans-in {
    width: 90px; height: 70px; text-align:center; border-radius: 14px;
    border: 2px solid #ffffff33; background:#fbf7ec; color:#222;
    font-size: 34px; font-weight: 900; font-family:'Times New Roman', serif;
  }
  .ans-in.ans-wide { width: 160px; }
  .ans-in:focus { outline:none; border-color:#ffd200; box-shadow: 0 0 0 3px #ffd20055; }
  .ans-in:disabled { opacity:.7; }
  .ans-root { font-size: 42px; font-weight: 900; font-family:'Times New Roman', serif; }
  .ans-plus { font-size: 36px; font-weight: 900; font-family:'Times New Roman', serif; }
  /* 〇√△＋□（定数項あり）の3欄レイアウトは少しコンパクトに */
  .ans-row.three { gap: 6px; }
  .ans-row.three .ans-in { width: 58px; height: 62px; font-size: 26px; }
  .ans-row.three .ans-root { font-size: 32px; }
  .ans-row.three .ans-plus { font-size: 28px; }
  .ans-btn {
    background: linear-gradient(135deg,#ffd200,#ff9d2a); color:#3a2400; border:none;
    border-radius: 999px; padding: 14px 48px; font-size: 20px; font-weight: 900;
    font-family: inherit; cursor: pointer; box-shadow: 0 4px 12px rgba(255,157,42,.4);
  }
  .ans-btn:active { transform: scale(.96); }
  .ans-btn:disabled { opacity:.5; }
  /* 入力欄の数値スピンを消してスッキリ */
  .ans-in::-webkit-outer-spin-button, .ans-in::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
  .ans-in[type=number] { -moz-appearance:textfield; }

  .feedback { text-align:center; font-size: 40px; font-weight:900; min-height: 46px; }
  .feedback.good { color:#6ee7b7; }
  .feedback.bad { color:#ff8a7a; }
  .dmg-pop { position:absolute; font-size: 26px; font-weight: 900; color:#ffd200; pointer-events:none;
    animation: dmgUp .8s ease-out forwards; text-shadow: 0 2px 4px rgba(0,0,0,.5); }
  @keyframes dmgUp { from{opacity:1; transform: translateY(0) scale(1);} to{opacity:0; transform: translateY(-50px) scale(1.4);} }

  /* 結果 */
  #result-screen { align-items:center; justify-content:center; gap: 14px; text-align:center; }
  .result-title { font-size: 30px; font-weight:900; }
  .result-title.win { color:#ffd200; }
  .result-title.lose { color:#ff8a7a; }
  .result-emoji { font-size: 64px; }
  .reward-box { background:#16204a; border-radius:14px; padding: 12px 24px; font-size: 18px; font-weight:800; }
  .reward-box .pea { color:#9ded62; font-size: 24px; }
</style>
</head>
<body>
<div id="app">

  <div id="title-screen" class="screen active">
    <div class="title-logo">ルート計算バトル</div>
    <div class="title-sub">⚔️ 平方根の総復習</div>
    <div class="title-desc">問題に正解して モンスターを たおそう！<br>簡約・乗除・加減・有理化・三乗根…ぜんぶ出るよ。<br>まちがえると ♥ が へるので 気をつけて！</div>
    <button class="btn btn-start" id="startBtn">スタート</button>
    <button class="btn btn-home" onclick="window.history.back()">🏠 ホームへ戻る</button>
  </div>

  <div id="select-screen" class="screen">
    <div class="select-head">
      <div class="title-logo" style="font-size:26px;">ステージをえらぼう</div>
      <div class="title-sub" style="margin-top:8px;">クリアすると次が解放！</div>
    </div>
    <div class="stage-list" id="stageList"></div>
    <button class="btn btn-home" onclick="window.history.back()">🏠 ホームへ戻る</button>
  </div>

  <div id="battle-screen" class="screen">
    <div class="enemy-card">
      <div class="enemy-top">
        <span id="enemyName">モンスター</span>
        <span id="enemyHpLabel">のこり 10問</span>
      </div>
      <div class="enemy-hearts" id="enemyHearts">♥♥♥♥♥♥♥♥♥♥</div>
      <div class="enemy-emoji" id="enemyEmoji">👾</div>
      <div class="player-row">
        <span class="stage-tag" id="stageTag">敵 1 / 5</span>
        <span class="hearts" id="hearts">♥♥♥♥♥</span>
      </div>
    </div>

    <div class="q-card">
      <div class="q-type" id="qType">簡約</div>
      <div class="q-text" id="qText">√12</div>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="choices" id="choices"></div>
  </div>

  <div id="result-screen" class="screen">
    <div class="result-emoji" id="resultEmoji">🏆</div>
    <div class="result-title win" id="resultTitle">クリア！</div>
    <div class="reward-box" id="rewardBox" style="display:none">🌱 <span class="pea" id="rewardNum">0</span> 個 ゲット！</div>
    <div id="resultSub" style="font-size:14px;color:#9ab;"></div>
    <button class="btn btn-start" id="retryBtn" style="font-size:18px;padding:14px 44px;">ステージへもどる</button>
    <button class="btn btn-home" onclick="window.history.back()">🏠 ホームへ戻る</button>
  </div>

</div>

<script src="../student-guard.js?v=2"></script>

    { q:'∛2 × ∛32',  a:'4'   },
    { q:'∛54 ÷ ∛2',  a:'3'   },
    { q:'∛128 ÷ ∛2', a:'4'   },
    { q:'∛24 ÷ ∛3',  a:'2'   },
    { q:'∛16 + ∛54', a:'5∛2' },
    { q:'∛24 + ∛81', a:'5∛3' },
    { q:'∛128 − ∛16', a:'2∛2' },
  ],
  // 真の隠しステージ：∛の中が大きい数（≦500）を素因数分解して簡単にする
  cubebig: [
    { q:'∛128', a:'4∛2'  }, // 2^6·2
    { q:'∛192', a:'4∛3'  }, // 64·3
    { q:'∛250', a:'5∛2'  }, // 125·2
    { q:'∛320', a:'4∛5'  }, // 64·5
    { q:'∛375', a:'5∛3'  }, // 125·3
    { q:'∛189', a:'3∛7'  }, // 27·7
    { q:'∛432', a:'6∛2'  }, // 216·2
    { q:'∛448', a:'4∛7'  }, // 64·7
    { q:'∛297', a:'3∛11' }, // 27·11
    { q:'∛500', a:'5∛4'  }, // 125·4
  ],
};
const TYPE_LABEL = { perfect:'① √を整数に（√4=2）', simplify:'② √を簡単に', muldiv:'③ かけ算・わり算', addsub:'④ たし算・ひき算', rational:'⑤ 分母の有理化', addsub4:'⑥ ルートの加減（4つの項）', cube:'🏁 三乗根（∛）を外す', cubecalc:'🌟 三乗根の計算（×÷・加減）', cubebig:'✨ 三乗根を簡単に（大きい数）' };
// ミスしたとき：答えではなく考え方のヒントを出す
const HINT = {
  perfect:  '💡 同じ数を2回かけて中の数になる数をさがそう（2×2=4 など）',
  simplify: '💡 √の中を「平方数 × 〇」に分けよう（4・9・16・25…）',
  muldiv:   '💡 √a×√b=√(a×b)、√a÷√b=√(a÷b) を使おう',
  addsub:   '💡 √の中が同じものどうしをまとめよう（ちがうときは先に√を簡単に）',
  rational: '💡 分母と同じ√を、分母と分子の両方にかけよう',
  addsub4:  '💡 √どうし・数どうしで仲間分けしてまとめよう（√の中が同じものが同類項）',
  cube:     '💡 ∛は3回かけて中の数になる。「3乗 × 〇」に分けよう',
  cubecalc: '💡 ∛a×∛b=∛(a×b)、∛a÷∛b=∛(a÷b)。たし算は∛の中が同じものをまとめよう',
  cubebig:  '💡 中の数を素因数分解 →「同じ数3つ（3乗）」を見つけて∛の外に出そう',
};

// ===== 敵（分野別・難易度順に1体ずつ）=====
const ENEMIES = [
  { name:'スライム',   emoji:'🟢', hp:50, field:'perfect' },
  { name:'コウモリ',   emoji:'🦇', hp:50, field:'simplify' },
  { name:'ヘビ',       emoji:'🐍', hp:55, field:'muldiv' },
  { name:'オーガ',     emoji:'👹', hp:55, field:'addsub' },
  { name:'ゾンビ',     emoji:'🧟', hp:55, field:'rational' },
  { name:'ゴーレム',   emoji:'🗿', hp:60, field:'addsub4' },
  { name:'ドラゴン王', emoji:'🐉', hp:60, field:'cube' },
  { name:'大賢者',     emoji:'🔮', hp:60, field:'cubecalc' }, // 隠しステージ（最終クリア後に解放）
  { name:'大魔王',     emoji:'😈', hp:60, field:'cubebig' },  // 真の隠しステージ（隠しステージクリア後に解放）
];
const MAX_HEARTS = 5;        // プレイヤーのハート
const ENEMY_HP = 10;         // 敵HP＝1種類10問（1問正解で♥1つ減る）
const REWARD_KEY = 'rootbattle';
// ステージ初クリア報酬（①10 …⑥60 最終100 隠し150 真隠し200）。再挑戦は一律5個
const STAGE_REWARDS = [10, 20, 30, 40, 50, 60, 100, 150, 200];
const REPLAY_REWARD = 5;

// ===== 状態 =====
let enemyIdx = 0, enemyHp = 0, hearts = MAX_HEARTS;
let current = null, qStart = 0, locked = false, qIndex = 0, qOrder = [], showHint = false;

const $ = id => document.getElementById(id);
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); $(id).classList.add('active'); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

// ===== ステージ進捗（localStorage） =====
const PROGRESS_KEY = 'rootbattle_v1';
function loadProgress(){
  try {
    const p = JSON.parse(localStorage.getItem(PROGRESS_KEY)||'null');
    if(p && Array.isArray(p.cleared)){
      // ステージ数が変わっても既存のクリア記録を保つ（足りない分は未クリアで補う）
      const c = p.cleared.slice(0, ENEMIES.length);
      while(c.length < ENEMIES.length) c.push(false);
      return { cleared: c };
    }
  } catch(e){}
  return { cleared: ENEMIES.map(()=>false) };
}
function saveProgress(p){ try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(p)); } catch(e){} }
// プレビュー（先生）はすべてのステージを見られる
const PREVIEW = (new URLSearchParams(location.search).get('preview') === '1')
  || (function(){ try { return localStorage.getItem('mathPreviewUnlocked') === '1'; } catch(e){ return false; } })();
function isUnlocked(i, prog){ return PREVIEW || i===0 || prog.cleared[i-1]===true; }
// ステージ名（末尾＝真の隠し／その手前＝隠し／さらに手前＝最終）
function stageLabel(i){
  if(i===ENEMIES.length-1) return '😈 真の隠しステージ';
  if(i===ENEMIES.length-2) return '🌟 隠しステージ';
  if(i===ENEMIES.length-3) return '最終ステージ';
  return 'ステージ'+(i+1);
}
function stageEmoji(i){
  if(i===ENEMIES.length-1) return '😈';
  if(i===ENEMIES.length-2) return '🌟';
  if(i===ENEMIES.length-3) return '👑';
  return '';
}

// ===== ステージ選択画面 =====
function showSelect(){
  const prog = loadProgress();
  const list = $('stageList');
  list.innerHTML = ENEMIES.map((e,i)=>{
    const unlocked = isUnlocked(i, prog);
    const cleared = prog.cleared[i];
    if(!unlocked){
      return `<button class="stage-item locked" disabled>
        <span class="st-emoji">🔒</span>
        <span class="st-text"><b>${stageLabel(i)}</b><br>？？？（まだロック中）</span>
      </button>`;
    }
    return `<button class="stage-item${cleared?' cleared':''}" data-i="${i}">
      <span class="st-emoji">${e.emoji}</span>
      <span class="st-text"><b>${stageLabel(i)}</b> ${cleared?'✅クリア済み':''}<br>${TYPE_LABEL[e.field]}</span>
    </button>`;
  }).join('');
  list.querySelectorAll('.stage-item[data-i]').forEach(b=>{
    b.onclick = ()=> startStage(parseInt(b.dataset.i,10));
  });
  showScreen('select-screen');
}

function startStage(i){
  enemyIdx = i; hearts = MAX_HEARTS;
  showScreen('battle-screen');
  loadEnemy();
}

function loadEnemy(){
  const e = ENEMIES[enemyIdx];
  enemyHp = ENEMY_HP;
  qIndex = 0;
  // 出題順：基本は難易度順。三乗根は「整数になる5問」だけランダムにする
  const pool = BANK[e.field];
  if (e.field === 'cube') {
    qOrder = shuffle(pool.slice(0, 5)).concat(pool.slice(5, 10));
  } else {
    qOrder = pool.slice(0, 10);
  }
  $('enemyName').textContent = (stageEmoji(enemyIdx) ? stageEmoji(enemyIdx)+' ' : '') + e.name;
  $('enemyEmoji').textContent = e.emoji;
  $('enemyEmoji').className = 'enemy-emoji';
  $('stageTag').textContent = `${stageLabel(enemyIdx)}（${enemyIdx+1}/${ENEMIES.length}）`;
  updateEnemyHp();
  updateHearts();
  nextProblem();
}

function updateEnemyHp(){
  let s=''; for(let i=0;i<ENEMY_HP;i++) s += i<enemyHp ? '♥' : '♡';
  $('enemyHearts').textContent = s;
  $('enemyHpLabel').textContent = `のこり ${Math.max(0,enemyHp)}問`;
}
function updateHearts(){
  let s=''; for(let i=0;i<MAX_HEARTS;i++) s += i<hearts ? '♥' : '♡';
  $('hearts').textContent = s;
}

// 次の問題へ（正解で1問進む。1種類10問・難易度順）
function nextProblem(){
  const e = ENEMIES[enemyIdx];
  const p = qOrder[qIndex % qOrder.length]; // loadEnemyで決めた出題順から
  qIndex++;
  const sym = (e.field.indexOf('cube') === 0) ? '∛' : '√';
  current = { type:e.field, q:p.q, a:p.a, sym: sym, ans: parseAns(p.a) };
  showHint = false; // 新しい問題ではヒントを消す
  renderProblem();
}

// 問題文＋入力欄を描画（まちがえたら同じ問題を再描画するので分離）
function renderProblem(){
  const type = current.type, sym = current.sym;
  $('qType').textContent = TYPE_LABEL[type];

  // 有理化は分数表記（分子が上・分母が下）
  if (type === 'rational' && current.q.indexOf('/') >= 0){
    const parts = current.q.split('/');
    const num = parts[0].trim(), den = parts[1].trim();
    $('qText').innerHTML = `<span class="frac"><span class="num">${num}</span><span class="den">${den}</span></span>`;
  } else {
    $('qText').innerHTML = current.q;
  }
  $('feedback').textContent = '';
  $('feedback').className = 'feedback';
  const wrap = $('choices');

  // 答えの形に合わせて入力欄を出し分け
  const ans = current.ans;
  let rowHtml, hint, rowClass = 'ans-row';
  if (ans.cons !== 0) {
    // 〇√△ ＋ □（定数項あり：ルートの加減 4項）
    rowHtml = `<input class="ans-in" id="coefIn" type="number" inputmode="numeric"><span class="ans-root">${sym}</span><input class="ans-in" id="radIn" type="number" inputmode="numeric"><span class="ans-plus">＋</span><input class="ans-in" id="consIn" type="number" inputmode="numeric">`;
    hint = '〇' + sym + '△ ＋ □ の形にまとめよう';
    rowClass = 'ans-row three';
  } else if (ans.rad === 1) {
    // 整数（ルートなし）→ √は出さない
    rowHtml = `<input class="ans-in ans-wide" id="coefIn" type="number" inputmode="numeric">`;
    hint = '答えの数を入力しよう';
  } else if (ans.coef === 1) {
    // 係数なし → 「√〇」の穴うめ（1ボックス）
    rowHtml = `<span class="ans-root">${sym}</span><input class="ans-in" id="radIn" type="number" inputmode="numeric">`;
    hint = sym + '〇 の 〇 に入る数を入力しよう';
  } else {
    // 〇√△
    rowHtml = `<input class="ans-in" id="coefIn" type="number" inputmode="numeric"><span class="ans-root">${sym}</span><input class="ans-in" id="radIn" type="number" inputmode="numeric">`;
    hint = '〇' + sym + '△ の 〇と△ を入力しよう';
  }
  wrap.innerHTML = `
    <div class="ans-hint">${hint}</div>
    ${showHint ? `<div class="ans-hint hint-tip">${HINT[type]||''}</div>` : ''}
    <div class="${rowClass}">${rowHtml}</div>
    <button class="ans-btn" id="ansBtn">こうげき！</button>`;
  $('ansBtn').onclick = submitAnswer;
  const inputs = [...wrap.querySelectorAll('input')];
  inputs.forEach((inp, idx) => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') { submitAnswer(); return; }
      // 矢印キーで隣の入力欄へ移動
      if (e.key === 'ArrowRight' && idx < inputs.length - 1) {
        e.preventDefault(); inputs[idx+1].focus(); inputs[idx+1].select();
      } else if (e.key === 'ArrowLeft' && idx > 0) {
        e.preventDefault(); inputs[idx-1].focus(); inputs[idx-1].select();
      }
    });
  });
  const first = wrap.querySelector('input');
  if (first) setTimeout(() => { first.focus(); first.select(); }, 50);
  locked = false;
  qStart = performance.now();
}

// 答え文字列を {coef, rad, cons} に変換（√・∛・"a√b+c" に対応）
function parseAns(a){
  const sym = a.indexOf('∛') >= 0 ? '∛' : (a.indexOf('√') >= 0 ? '√' : null);
  if (!sym){
    return { coef: parseInt(a, 10), rad: 1, cons: 0 }; // 整数（中を1扱い）
  }
  // "a√b+c" 形（定数項あり）に対応
  let rootPart = a, cons = 0;
  const pi = a.indexOf('+');
  if (pi >= 0){
    rootPart = a.slice(0, pi);
    cons = parseInt(a.slice(pi + 1), 10) || 0;
  }
  const parts = rootPart.split(sym);
  const coef = parts[0] === '' ? 1 : parseInt(parts[0], 10);
  const rad = parseInt(parts[1], 10);
  return { coef, rad, cons };
}

function submitAnswer(){
  if(locked) return;
  let correct = false;
  const ki = $('consIn');
  const cv = (($('coefIn')||{}).value || '').trim();
  const rv = (($('radIn')||{}).value || '').trim();
  const kv = ((ki||{}).value || '').trim();
  const c = cv === '' ? 1 : parseInt(cv, 10); // 係数の欄：未入力は 1 とみなす
  const r = rv === '' ? 1 : parseInt(rv, 10); // ルートの中：未入力は 1 とみなす
  const k = ki ? (kv === '' ? NaN : parseInt(kv, 10)) : 0; // 定数の欄：欄が無ければ 0／空欄は不正解
  const ans = current.ans;
  if (c === ans.coef && r === ans.rad && k === (ans.cons || 0)) correct = true;
  locked = true;
  $('choices').querySelectorAll('input,button').forEach(el => el.disabled = true);
  resolve(correct);
}

function resolve(correct){
  if(correct){
    enemyHp -= 1; // 1問正解で敵の♥を1つ減らす
    $('feedback').textContent = '⭕ せいかい！';
    $('feedback').className = 'feedback good';
    const em = $('enemyEmoji');
    em.classList.remove('hit'); void em.offsetWidth; em.classList.add('hit');
    showDmg('♥');
    updateEnemyHp();
    if(enemyHp <= 0){
      em.classList.add('defeated');
      setTimeout(()=> stageClear(enemyIdx), 800); // 10問すべて正解でステージクリア
    } else {
      setTimeout(nextProblem, 700);
    }
  } else {
    hearts -= 1; // まちがえると自分の♥が減る
    updateHearts();
    showHint = true; // 正解は出さず、ヒントを表示
    $('feedback').textContent = '💥 ミス！';
    $('feedback').className = 'feedback bad';
    if(hearts <= 0){ setTimeout(gameOver, 1300); }
    else { setTimeout(renderProblem, 1500); } // 同じ問題をもう一度（10問解くまで進めない）
  }
}

function showDmg(d){
  const pop = document.createElement('div');
  pop.className = 'dmg-pop';
  pop.textContent = '-' + d; // 敵の♥が1つ減る演出
  const card = document.querySelector('.enemy-card');
  pop.style.left = (card.offsetLeft + card.offsetWidth/2 - 10) + 'px';
  pop.style.top = (card.offsetTop + 60) + 'px';
  $('app').appendChild(pop);
  setTimeout(()=>pop.remove(), 800);
}

// ===== 数学HP の localStorage(mathPrint_v2)＋すごろくに加算 =====
function addEarnedPeas(amount){
  if(amount<=0) return;
  try {
    const p = JSON.parse(localStorage.getItem('mathPrint_v2')||'{}')||{};
    let cur = p.peaCount||0, cups = p.peaCupCount||0;
    cur += amount;
    while(cur>=45){ cur-=45; cups++; }
    p.peaCount=cur; p.peaCupCount=cups;
    if(!p.done||typeof p.done!=='object') p.done={};
    localStorage.setItem('mathPrint_v2', JSON.stringify(p));
  } catch(e){}
  try {
    const stage = parseInt(localStorage.getItem('sgCurrentStage')||'1');
    const key = stage===2?'sgSave_v2':'sgSave_v1';
    const sv = JSON.parse(localStorage.getItem(key)||'{}')||{};
    sv.peas = (sv.peas||0) + amount;
    localStorage.setItem(key, JSON.stringify(sv));
  } catch(e){}
}

function stageClear(i){
  const prog = loadProgress();
  const firstClear = !prog.cleared[i];
  prog.cleared[i] = true;
  saveProgress(prog);

  showScreen('result-screen');
  $('resultEmoji').textContent = stageEmoji(i) || '🏆';
  $('resultTitle').textContent = stageLabel(i)+' クリア！';
  $('resultTitle').className = 'result-title win';

  // 報酬：初クリアはステージごとの額（1回だけなので上限なし）。再挑戦は一律5個・1日5回まで
  let reward, capped = false;
  if(firstClear){
    reward = (STAGE_REWARDS[i] != null) ? STAGE_REWARDS[i] : (i===ENEMIES.length-1 ? 100 : (i+1)*10);
    addEarnedPeas(reward);
  } else {
    reward = REPLAY_REWARD;
    if(typeof rewardAllowed==='function' && !rewardAllowed(REWARD_KEY)){ reward = 0; capped = true; }
    else { addEarnedPeas(reward); }
  }
  if(capped){
    $('rewardBox').style.display = 'block';
    $('rewardBox').innerHTML = '本日の🌱はここまで（1日'+(window.REWARD_MAX_PER_GAME||5)+'回まで）また明日！';
  } else {
    $('rewardBox').style.display = 'block';
    $('rewardBox').innerHTML = '🌱 <span class="pea">'+reward+'</span> 個 ゲット！';
  }

  // 解放メッセージ
  if(firstClear && i < ENEMIES.length-1){
    $('resultSub').textContent = '🔓 '+stageLabel(i+1)+' が解放された！';
  } else if(firstClear && i === ENEMIES.length-1){
    $('resultSub').textContent = '🎉 全ステージ制覇！おめでとう！';
  } else {
    $('resultSub').textContent = (hearts===MAX_HEARTS) ? '⭐ ノーミス！' : '♥ 残り '+hearts;
  }
}

function gameOver(){
  showScreen('result-screen');
  $('resultEmoji').textContent = '💀';
  $('resultTitle').textContent = 'やられた…';
  $('resultTitle').className = 'result-title lose';
  $('rewardBox').style.display = 'none';
  $('resultSub').textContent = 'もう一度チャレンジしよう！（クリアで🌱ゲット）';
}

$('startBtn').addEventListener('click', showSelect);
$('retryBtn').addEventListener('click', showSelect);
</script>
