<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 - 数学プリントHP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #0d0d2b; color: white; min-height: 100vh; }

    /* ===== ログイン画面 ===== */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: #16163a; border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px; padding: 3rem 2.5rem; width: min(380px, 92vw);
      text-align: center; box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }
    .login-card h1 { font-size: 1.5rem; margin-bottom: 0.4rem; }
    .login-card p { color: rgba(255,255,255,0.5); font-size: 0.88rem; margin-bottom: 2rem; }
    .login-input {
      width: 100%; padding: 0.85rem 1rem; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: white;
      font-size: 1.1rem; text-align: center; outline: none; letter-spacing: 0.2em;
      font-family: inherit; margin-bottom: 1rem;
    }
    .login-btn {
      width: 100%; padding: 0.85rem; background: linear-gradient(135deg, #667eea, #764ba2);
      border: none; border-radius: 12px; color: white; font-size: 1rem;
      font-weight: 800; font-family: inherit; cursor: pointer;
    }
    .login-btn:hover { filter: brightness(1.1); }
    .login-error { color: #ff6b6b; font-size: 0.85rem; margin-top: 0.6rem; display: none; }

    /* ===== カードマッチ 小林Tタイム設定バー ===== */
    .cm-teacher-setting {
      display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
      background: rgba(251,191,36,0.08); border-bottom: 1px solid rgba(251,191,36,0.25);
      padding: 0.55rem 2rem; font-size: 0.88rem;
    }
    .cm-ts-label  { color: #fbbf24; font-weight: 700; white-space: nowrap; }
    .cm-ts-input  {
      width: 64px; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(251,191,36,0.4); border-radius: 6px;
      color: #fbbf24; font-size: 1rem; font-weight: 800;
      text-align: center; padding: 0.15rem 0.3rem; font-family: monospace; outline: none;
    }
    .cm-ts-input:focus { border-color: #fbbf24; }
    .cm-ts-unit   { color: rgba(255,255,255,0.45); font-size: 0.8rem; }
    .cm-ts-btn {
      background: rgba(251,191,36,0.2); border: 1px solid rgba(251,191,36,0.5);
      color: #fbbf24; border-radius: 6px; padding: 0.2rem 0.8rem;
      font-size: 0.82rem; font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .cm-ts-btn:hover { background: rgba(251,191,36,0.35); }
    .cm-ts-status { font-size: 0.8rem; color: #86efac; }

    /* ===== 管理画面 ===== */
    #admin-screen { display: none; }
    .admin-header {
      background: #16163a; border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .admin-header h1 { font-size: 1.1rem; }
    .save-all-btn {
      padding: 0.6rem 1.6rem; background: linear-gradient(135deg, #56ab2f, #a8e063);
      border: none; border-radius: 50px; color: #0d0d2b; font-size: 0.9rem;
      font-weight: 800; font-family: inherit; cursor: pointer;
    }
    .save-all-btn:hover { filter: brightness(1.1); }
    .import-btn {
      padding: 0.6rem 1.6rem; background: linear-gradient(135deg, #f093fb, #f5576c);
      border: none; border-radius: 50px; color: white; font-size: 0.9rem;
      font-weight: 800; font-family: inherit; cursor: pointer; margin-left: 0.7rem;
    }
    .import-btn:hover { filter: brightness(1.15); }
    .import-btn:disabled { opacity: 0.5; cursor: not-allowed; filter: none; }
    .push-btn {
      padding: 0.6rem 1.6rem; background: linear-gradient(135deg, #667eea, #764ba2);
      border: none; border-radius: 50px; color: white; font-size: 0.9rem;
      font-weight: 800; font-family: inherit; cursor: pointer; margin-left: 0.7rem;
    }
    .push-btn:hover { filter: brightness(1.15); }
    .push-btn:disabled { opacity: 0.5; cursor: not-allowed; filter: none; }
    .save-status {
      font-size: 0.82rem; color: #9ded62; margin-left: 1rem; display: none;
    }
    .push-status {
      font-size: 0.82rem; margin-left: 0.8rem; display: none;
    }

    /* ===== コンテンツ ===== */
    .admin-content { max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    /* ===== 章タブ ===== */
    .chapter-tabs { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .chapter-tab {
      padding: 0.5rem 1.2rem; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7);
      font-size: 0.85rem; cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .chapter-tab.active { background: linear-gradient(135deg, #667eea, #764ba2); border-color: transparent; color: white; font-weight: 700; }

    /* ===== 節パネル ===== */
    .section-panel { margin-bottom: 2rem; }
    .section-heading {
      font-size: 1.1rem; font-weight: 800; padding: 0.8rem 1.2rem;
      background: rgba(255,255,255,0.06); border-radius: 12px 12px 0 0;
      border: 1px solid rgba(255,255,255,0.1); border-bottom: none;
      display: flex; align-items: center; gap: 0.6rem;
    }
    .section-body {
      border: 1px solid rgba(255,255,255,0.1); border-radius: 0 0 12px 12px; overflow: hidden;
    }

    /* ===== 先生タイム入力 ===== */
    .teacher-time-wrap {
      display: flex; align-items: center; gap: 0.5rem;
      background: rgba(0,210,255,0.10); border: 1px solid rgba(0,210,255,0.3);
      border-radius: 8px; padding: 0.2rem 0.7rem; font-size: 0.82rem;
    }
    .teacher-time-label { color: rgba(255,255,255,0.5); white-space: nowrap; }
    .teacher-time-input {
      width: 72px; background: rgba(255,255,255,0.08); border: 1px solid rgba(0,210,255,0.4);
      border-radius: 6px; color: #00d2ff; font-size: 1rem; font-weight: 800;
      text-align: center; padding: 0.1rem 0.3rem; font-family: monospace; outline: none;
    }
    .teacher-time-input:focus { border-color: #00d2ff; background: rgba(0,210,255,0.15); }
    .teacher-time-unit { color: rgba(255,255,255,0.4); font-size: 0.8rem; }

    /* ===== 生徒自己ベスト入力 ===== */
    .student-best-wrap {
      display: flex; align-items: center; gap: 0.4rem;
      background: rgba(157,237,98,0.10); border: 1px solid rgba(157,237,98,0.3);
      border-radius: 8px; padding: 0.2rem 0.7rem; font-size: 0.82rem;
    }
    .student-best-label { color: rgba(255,255,255,0.5); white-space: nowrap; }
    .student-best-name-input {
      width: 80px; background: rgba(255,255,255,0.08); border: 1px solid rgba(157,237,98,0.4);
      border-radius: 6px; color: #9ded62; font-size: 0.85rem; font-weight: 700;
      text-align: center; padding: 0.15rem 0.4rem; font-family: inherit; outline: none;
    }
    .student-best-time-input {
      width: 62px; background: rgba(255,255,255,0.08); border: 1px solid rgba(157,237,98,0.4);
      border-radius: 6px; color: #9ded62; font-size: 1rem; font-weight: 800;
      text-align: center; padding: 0.1rem 0.3rem; font-family: monospace; outline: none;
    }
    .student-best-name-input:focus,
    .student-best-time-input:focus { border-color: #9ded62; background: rgba(157,237,98,0.1); }
    .student-best-unit { color: rgba(255,255,255,0.4); font-size: 0.8rem; }
    .student-best-save-btn {
      background: #9ded62; color: #1a3a0a; border: none; border-radius: 6px;
      padding: 0.15rem 0.6rem; font-size: 0.8rem; font-weight: 800;
      cursor: pointer; white-space: nowrap;
    }
    .student-best-save-btn:hover { background: #7dcc4a; }
    .student-best-save-btn:disabled { opacity: 0.5; cursor: default; }
    .student-best-save-status { font-size: 0.78rem; font-weight: 700; white-space: nowrap; }

    /* ===== 小テストパスワード表示 ===== */
    .minitest-pw-wrap {
      margin-left: auto; display: flex; align-items: center; gap: 0.5rem;
      background: rgba(255,213,0,0.12); border: 1px solid rgba(255,213,0,0.3);
      border-radius: 8px; padding: 0.2rem 0.7rem; font-size: 0.82rem;
    }
    .minitest-pw-label { color: rgba(255,255,255,0.5); }
    .minitest-pw-code {
      font-size: 1rem; font-weight: 800; color: #ffd200;
      letter-spacing: 0.18em; font-family: monospace;
    }
    .minitest-pw-regen {
      background: none; border: none; cursor: pointer; font-size: 0.9rem;
      padding: 0 0.2rem; opacity: 0.6; transition: opacity 0.15s;
    }
    .minitest-pw-regen:hover { opacity: 1; }

    /* ===== レベルタブ ===== */
    .level-tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .level-tab {
      flex: 1; padding: 0.6rem; text-align: center; font-size: 0.82rem;
      cursor: pointer; font-family: inherit; border: none; font-weight: 700;
      transition: background 0.2s;
    }
    .level-tab[data-lv="0"] { background: rgba(78,205,196,0.12); color: #4ecdc4; }
    .level-tab[data-lv="1"] { background: rgba(247,151,30,0.12); color: #f7971e; }
    .level-tab[data-lv="2"] { background: rgba(245,87,108,0.12); color: #f5576c; }
    .level-tab.active[data-lv="0"] { background: rgba(78,205,196,0.3); }
    .level-tab.active[data-lv="1"] { background: rgba(247,151,30,0.3); }
    .level-tab.active[data-lv="2"] { background: rgba(245,87,108,0.3); }

    /* ===== 問題テーブル ===== */
    .questions-table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.02); }
    .questions-table th {
      padding: 0.6rem 1rem; font-size: 0.78rem; color: rgba(255,255,255,0.45);
      text-align: left; border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03); font-weight: 500;
    }
    .questions-table td { padding: 0.5rem 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.06); vertical-align: middle; }
    .q-num { font-size: 0.78rem; color: rgba(255,255,255,0.4); width: 2.5rem; }
    .q-input {
      width: 100%; padding: 0.45rem 0.7rem; background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: white;
      font-size: 0.88rem; font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    .q-input:focus { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.1); }
    .a-input {
      width: 120px; padding: 0.45rem 0.7rem; background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: #9ded62;
      font-size: 0.88rem; font-family: inherit; outline: none; transition: border-color 0.2s;
      font-weight: 700;
    }
    .a-input:focus { border-color: rgba(100,230,100,0.5); }
    .b-input {
      width: 140px; padding: 0.45rem 0.7rem; background: rgba(255,255,255,0.07);
      border: 1px dashed rgba(255,200,80,0.35); border-radius: 8px; color: #ffd580;
      font-size: 0.88rem; font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    .b-input:focus { border-color: rgba(255,200,80,0.7); background: rgba(255,200,80,0.08); }
    .b-input::placeholder { color: rgba(255,200,80,0.3); }
    .questions-table tr:last-child td { border-bottom: none; }

    /* ===== ドラッグ並び替え ===== */
    .drag-th  { width: 2rem; }
    .drag-cell { width: 2rem; text-align: center; padding: 0.3rem 0.2rem !important; }
    .drag-handle {
      display: inline-block; cursor: grab; font-size: 1.15rem;
      color: rgba(255,255,255,0.28); user-select: none; padding: 0 0.25rem;
      transition: color 0.15s;
    }
    .drag-handle:hover { color: rgba(255,255,255,0.75); }
    .drag-handle:active { cursor: grabbing; }
    tr.q-row { transition: background 0.1s; }
    tr.q-row.dragging { opacity: 0.3; }
    tr.q-row.drag-over td { box-shadow: inset 0 3px 0 #667eea; }
    tr.q-row.drag-over { background: rgba(102,126,234,0.15) !important; }

    /* ===== 削除ボタン ===== */
    .del-th  { width: 2.2rem; }
    .del-cell { width: 2.2rem; text-align: center; padding: 0.3rem 0.2rem !important; }
    .del-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 1.55rem; height: 1.55rem; border-radius: 50%;
      background: rgba(255,80,80,0.15); border: 1px solid rgba(255,80,80,0.3);
      color: rgba(255,100,100,0.7); font-size: 0.9rem; cursor: pointer;
      font-family: inherit; line-height: 1; transition: all 0.15s;
    }
    .del-btn:hover { background: rgba(255,80,80,0.35); color: #ff6b6b; border-color: #ff6b6b; }

    /* ===== 生徒プレビュー列 ===== */
    .prev-th { min-width: 180px; }
    .prev-cell { padding: 0.4rem 0.8rem !important; vertical-align: middle; }
    .prev-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 0.35rem 0.65rem;
      font-size: 0.83rem;
      line-height: 1.6;
      min-height: 2rem;
      color: rgba(255,255,255,0.85);
      word-break: break-all;
    }
    .prev-arrow {
      color: rgba(255,255,255,0.35);
      margin: 0 0.3em;
      font-size: 0.78rem;
    }
    .prev-blank {
      color: #67e8ff;
      font-weight: 800;
      letter-spacing: 0.05em;
    }
    .prev-empty { color: rgba(255,255,255,0.2); font-style: italic; font-size: 0.78rem; }

    /* ===== 問題追加ボタン ===== */
    .add-q-btn {
      display: block; width: calc(100% - 1.6rem); margin: 0.5rem 0.8rem;
      padding: 0.4rem; background: rgba(255,255,255,0.04);
      border: 1px dashed rgba(255,255,255,0.18); border-radius: 8px;
      color: rgba(255,255,255,0.45); font-size: 0.82rem; cursor: pointer;
      font-family: inherit; transition: all 0.15s; text-align: center;
    }
    .add-q-btn:hover { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.8); }

    /* ===== 分数ヒント ===== */
    .frac-hint {
      font-size: 0.75rem; color: rgba(255,255,255,0.38);
      padding: 0.3rem 1rem 0.5rem; letter-spacing: 0.03em;
    }
    .frac-hint code {
      background: rgba(255,255,255,0.08); border-radius: 4px;
      padding: 0.05rem 0.35rem; color: rgba(255,255,255,0.6);
    }

    /* ===== 共通因数ウォール 問題管理 ===== */
    .wall-section {
      background: rgba(255,138,42,0.06);
      border-bottom: 1px solid rgba(255,138,42,0.2);
    }
    .wall-section-header {
      display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
      padding: 0.55rem 2rem; cursor: pointer; user-select: none;
      font-size: 0.88rem;
    }
    .wall-section-label { color: #ff8a2a; font-weight: 700; white-space: nowrap; }
    .wall-section-count { color: rgba(255,255,255,0.4); font-size: 0.8rem; }
    .wall-section-toggle { color: rgba(255,255,255,0.35); font-size: 0.8rem; margin-left: auto; }
    .wall-section-body { padding: 0.6rem 2rem 1rem; overflow-x: auto; }
    .wall-table { border-collapse: collapse; font-size: 0.85rem; }
    .wall-table th {
      padding: 0.3rem 0.6rem; color: rgba(255,255,255,0.4);
      font-size: 0.78rem; font-weight: 500;
      border-bottom: 1px solid rgba(255,138,42,0.2); text-align: left;
    }
    .wall-table td { padding: 0.3rem 0.4rem; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
    .wall-num { font-size: 0.75rem; color: rgba(255,255,255,0.35); width: 2rem; text-align: center; padding: 0.3rem; }
    .wall-term-input {
      width: 88px; padding: 0.3rem 0.5rem;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,138,42,0.3);
      border-radius: 6px; color: white; font-size: 0.85rem;
      font-family: 'Consolas', monospace; outline: none;
    }
    .wall-term-input:focus { border-color: #ff8a2a; background: rgba(255,138,42,0.1); }
    .wall-toggle-btn {
      padding: 0.18rem 0.5rem; background: rgba(255,138,42,0.12);
      border: 1px solid rgba(255,138,42,0.3); color: #ff8a2a;
      border-radius: 5px; font-size: 0.76rem; cursor: pointer;
      font-family: inherit; margin-left: 4px;
    }
    .wall-toggle-btn:hover { background: rgba(255,138,42,0.28); }
    .wall-del-cell { text-align: center; width: 2rem; padding: 0.3rem 0.2rem !important; }
    .wall-del-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 1.4rem; height: 1.4rem; border-radius: 50%;
      background: rgba(255,80,80,0.12); border: 1px solid rgba(255,80,80,0.25);
      color: rgba(255,100,100,0.6); font-size: 0.82rem; cursor: pointer;
      font-family: inherit; transition: all 0.15s;
    }
    .wall-del-btn:hover { background: rgba(255,80,80,0.3); color: #ff6b6b; }
    .wall-save-inline {
      padding: 0.22rem 0.9rem; background: rgba(255,138,42,0.2);
      border: 1px solid rgba(255,138,42,0.5); color: #ff8a2a;
      border-radius: 6px; font-size: 0.82rem; font-weight: 700;
      cursor: pointer; font-family: inherit; white-space: nowrap;
    }
    .wall-save-inline:hover { background: rgba(255,138,42,0.38); }
    .wall-save-inline:disabled { opacity: 0.5; cursor: default; }
    .wall-save-status { font-size: 0.8rem; white-space: nowrap; }
    .wall-add-btn {
      display: inline-block; margin-top: 0.5rem;
      padding: 0.33rem 1rem; background: rgba(255,255,255,0.04);
      border: 1px dashed rgba(255,138,42,0.35); color: rgba(255,255,255,0.45);
      border-radius: 6px; font-size: 0.82rem; cursor: pointer; font-family: inherit;
    }
    .wall-add-btn:hover { background: rgba(255,138,42,0.1); color: #ff8a2a; }
    .wall-lv-tabs {
      display: flex; gap: 0.4rem; margin: 0 0 0.6rem; flex-wrap: wrap;
    }
    .wall-lv-tab {
      padding: 0.32rem 0.95rem; border-radius: 999px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.55); font-size: 0.82rem; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap;
    }
    .wall-lv-tab:hover { background: rgba(255,255,255,0.1); color: white; }
    .wall-lv-tab.active[data-lv="1"]   { background: linear-gradient(135deg,#4ecdc4,#37a8a1); border-color: transparent; color: #003830; }
    .wall-lv-tab.active[data-lv="2"]   { background: linear-gradient(135deg,#f7971e,#cf7a0a); border-color: transparent; color: #3a1f00; }
    .wall-lv-tab.active[data-lv="3"]   { background: linear-gradient(135deg,#f5576c,#c43a4d); border-color: transparent; color: #3d0710; }
    .wall-lv-tab.active[data-lv="all"] { background: linear-gradient(135deg,#667eea,#4654a8); border-color: transparent; color: white; }
    .wall-lv-tab .lv-cnt {
      margin-left: 6px; font-size: 0.72rem; opacity: 0.75; font-weight: 600;
    }
    .wall-drag-cell { width: 1.8rem; text-align: center; padding: 0.3rem 0.15rem !important; }
    .wall-drag-handle {
      display: inline-block; cursor: grab; font-size: 1.1rem;
      color: rgba(255,138,42,0.35); user-select: none; padding: 0 0.2rem;
      transition: color 0.15s;
    }
    .wall-drag-handle:hover { color: #ff8a2a; }
    .wall-drag-handle:active { cursor: grabbing; }
    tr.wall-row.wall-dragging { opacity: 0.3; }
    tr.wall-row.wall-drag-over td { box-shadow: inset 0 3px 0 #ff8a2a; }
    tr.wall-row.wall-drag-over { background: rgba(255,138,42,0.12) !important; }
  </style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-card">
    <h1>🔐 管理画面</h1>
    <p>先生用パスワードを入力してください</p>
    <input type="password" id="pw-input" class="login-input" placeholder="パスワード" autocomplete="off">
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div id="login-error" class="login-error">パスワードが違います</div>
  </div>
</div>

<!-- 管理画面 -->
<div id="admin-screen" style="display:none">
  <div class="admin-header">
    <h1>📝 問題管理画面</h1>
    <div style="display:flex;align-items:center">
      <span id="push-status" class="push-status"></span>
      <span id="save-status" class="save-status">✓ 保存しました</span>
      <button class="import-btn" id="import-btn" onclick="importFromExcel()">📥 Excelから取り込む</button>
      <button class="save-all-btn" onclick="saveAll()">💾 保存する</button>

           min="1" max="300" step="1" placeholder="秒">

<script>
// ===== 設定 =====
const ADMIN_PASSWORD = 'sensei2024';  // ← パスワードをここで変更できます

const LEVEL_LABELS = ['★ 基礎レベル', '★★ 標準レベル', '★★★ 応用レベル'];
const LEVEL_KEYS   = ['basic', 'standard', 'advanced'];

let questionsData = null;
let originalSnapshot = null; // NEWS自動検知用
let currentChapter = 0;
let enteredPassword = '';

// ===== ログイン =====
function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === ADMIN_PASSWORD) {
    enteredPassword = pw;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadQuestions();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ===== 旧フォーマット → 新フォーマット自動変換 =====
// 旧: { q: "X = Y＿＿Z", a: "blank" }
// 新: { q: "X", a: "Yblank Z", b: "blank" }
function migrateToNewFormat(data) {
  data.chapters.forEach(ch => {
    (ch.sections || []).forEach(sec => {
      ['basic', 'standard', 'advanced'].forEach(key => {
        (sec[key] || []).forEach(item => {
          if (item.b !== undefined) return; // すでに新フォーマット
          const q = item.q || '';
          const a = item.a || '';
          if (!q.includes('＿＿')) {
            item.b = '';
            return;
          }
          const eqIdx = q.indexOf(' = ');
          if (eqIdx !== -1) {
            // "左辺 = 右辺＿＿" パターン
            const leftQ    = q.substring(0, eqIdx).trim();
            const rightPart = q.substring(eqIdx + 3).trim();
            item.q = leftQ;
            item.a = rightPart.replace('＿＿', a);
            item.b = a;
          } else {
            // "〜の係数は ＿＿" など＝なしパターン
            const blankIdx = q.indexOf('＿＿');
            item.q = q.substring(0, blankIdx).trim();
            // a（答え全体）はそのまま、穴埋めなし
            item.b = '';
          }
        });
      });
    });
  });
  return data;
}

// ===== パスワードハッシュ =====
const _PW_SALT = 'mathprint_';
async function hashPw(plain) {
  const buf = await crypto.subtle.digest('SHA-256',
    new TextEncoder().encode(_PW_SALT + plain));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}
function isHashed(v) { return typeof v === 'string' && /^[0-9a-f]{64}$/.test(v); }

// 平文パスワードを一時保持（再生成後・保存前に表示用）
const _pwPlain = {};  // key: `${chIdx}_${si}` → 平文

// ===== ランダム4桁パスワード生成 =====
function genPassword() {
  return String(Math.floor(Math.random() * 9000) + 1000);
}

// 未設定の節にパスワードを自動付与（平文のまま。保存時にハッシュ化）
function ensurePasswords(data) {
  data.chapters.forEach(ch => {
    (ch.sections || []).forEach(sec => {
      if (!sec.miniTestPassword) sec.miniTestPassword = genPassword();
    });
  });
  return data;
}

function updateTeacherTime(chIdx, si, val) {
  const num = parseFloat(val);
  questionsData.chapters[chIdx].sections[si].teacherTime = isNaN(num) ? null : Math.round(num * 10) / 10;
}

function updateStudentBest(chIdx, si, field, val) {
  const sec = questionsData.chapters[chIdx].sections[si];
  if (field === 'name') {
    sec.studentBestName = val.trim() || null;
  } else {
    const num = parseFloat(val);
    sec.studentBestTime = isNaN(num) ? null : Math.round(num * 10) / 10;
  }
}

async function saveStudentBest(chIdx, si, btn) {
  const sta = document.getElementById(`sb-status-${chIdx}-${si}`);
  // 入力欄からその場の値を読み取って questionsData に反映
  // （onchange未発火の状態でも確実に反映させる）
  const wrap = btn.closest('.student-best-wrap');
  if (wrap) {
    const nameEl = wrap.querySelector('.student-best-name-input');
    const timeEl = wrap.querySelector('.student-best-time-input');
    if (nameEl) updateStudentBest(chIdx, si, 'name', nameEl.value);
    if (timeEl) updateStudentBest(chIdx, si, 'time', timeEl.value);
  }
  btn.textContent = '保存中...';
  btn.disabled = true;
  // 変更を検出して NEWS に追加
  detectAndPushNews();
  try {
    const res = await fetch('/api/questions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: enteredPassword, adminPassword: enteredPassword, data: questionsData })
    });
    const r = await res.json();
    sta.textContent = r.ok ? '✓ 保存しました' : '❌ 失敗';
    sta.style.color = r.ok ? '#2ecc71' : '#e74c3c';
    if (r.ok) { refreshSnapshot(); renderNewsAdmin(); }
  } catch(e) {
    sta.textContent = '❌ エラー';
    sta.style.color = '#e74c3c';
  }
  btn.textContent = '更新';
  btn.disabled = false;
  setTimeout(() => { sta.textContent = ''; }, 3000);
}

// パスワード再生成ボタン
function regenPassword(chIdx, si) {
  const newPw = genPassword();
  _pwPlain[`${chIdx}_${si}`] = newPw;           // 平文を一時保存
  questionsData.chapters[chIdx].sections[si].miniTestPassword = newPw;  // 保存時にハッシュ化される
  const el = document.getElementById(`pw-display-${chIdx}-${si}`);
  if (el) {
    el.textContent = newPw;
    el.style.transition = 'color 0s';
    el.style.color = '#ff9f43';
    setTimeout(() => { el.style.transition = 'color 0.6s'; el.style.color = '#ffd200'; }, 300);
  }
}

// 保存前に全パスワードをハッシュ化
async function hashAllPasswords(data) {
  for (const ch of data.chapters) {
    for (const sec of (ch.sections || [])) {
      if (sec.miniTestPassword && !isHashed(sec.miniTestPassword)) {
        sec.miniTestPassword = await hashPw(sec.miniTestPassword);
      }
    }
  }
  return data;
}

// ===== 問題データ読み込み =====
async function loadQuestions() {
  const res = await fetch('/api/questions');
  questionsData = ensurePasswords(migrateToNewFormat(await res.json()));
  // カードマッチ 小林Tタイムをフォームに反映
  const t = questionsData.cardMatchTeacherTime;
  const el = document.getElementById('cm-teacher-time-input');
  if (el && t != null) el.value = t;
  // カードマッチ 生徒ベストをフォームに反映
  const sn = document.getElementById('cm-student-name-input');
  const st = document.getElementById('cm-student-time-input');
  if (sn) sn.value = questionsData.cardMatchStudentBestName || '';
  if (st && questionsData.cardMatchStudentBestTime != null) st.value = questionsData.cardMatchStudentBestTime;
  // NEWS 自動検知用にスナップショットを保存
  if (!Array.isArray(questionsData.news)) questionsData.news = [];
  originalSnapshot = JSON.parse(JSON.stringify(questionsData));
  renderChapterTabs();
  renderSections(0);
  renderWallProblems();
  renderNewsAdmin();
}

// =====================================================
//   NEWS 自動検知 / 管理
// =====================================================
let newsAdminOpen = false;

function toggleNewsAdminSection() {
  newsAdminOpen = !newsAdminOpen;
  document.getElementById('news-admin-body').style.display = newsAdminOpen ? 'block' : 'none';
  document.getElementById('news-admin-toggle').textContent = newsAdminOpen ? '▲ 閉じる' : '▼ 開く';
}

function genNewsId() {
  return String(Date.now()) + '-' + Math.random().toString(36).slice(2, 7);
}

// オリジナルと現在を比較してNEWSを自動生成
function detectAndPushNews() {
  if (!originalSnapshot) return;
  const news = [];
  const now = new Date().toISOString();

  // カードマッチ 小林Tタイム
  if (originalSnapshot.cardMatchTeacherTime !== questionsData.cardMatchTeacherTime &&
      questionsData.cardMatchTeacherTime != null) {
    news.push({
      id: genNewsId(), type: 'auto', icon: '👑',
      title: `小林Tがカードマッチを ${questionsData.cardMatchTeacherTime}秒 で更新！`,
      date: now
    });
  }
  // カードマッチ 生徒ベスト
  const oldCmName = originalSnapshot.cardMatchStudentBestName || '';
  const oldCmTime = originalSnapshot.cardMatchStudentBestTime;
  const newCmName = questionsData.cardMatchStudentBestName || '';
  const newCmTime = questionsData.cardMatchStudentBestTime;
  if ((oldCmName !== newCmName || oldCmTime !== newCmTime) && newCmName && newCmTime != null) {
    news.push({
      id: genNewsId(), type: 'auto', icon: '🏅',
      title: `${newCmName} がカードマッチを ${newCmTime}秒 で更新！`,
      date: now
    });
  }

  // 章/節
  const chs = questionsData.chapters || [];
  const oldChs = originalSnapshot.chapters || [];
  for (let chIdx = 0; chIdx < chs.length; chIdx++) {
    const ch = chs[chIdx];
    const oldCh = oldChs[chIdx] || {};
    const oldSecs = oldCh.sections || [];
    const secs = ch.sections || [];
    for (let si = 0; si < secs.length; si++) {
      const sec = secs[si];
      const oldSec = oldSecs[si] || {};
      const label = `第${ch.id}章「${sec.title}」`;

      if (sec.teacherTime !== oldSec.teacherTime && sec.teacherTime != null) {
        news.push({
          id: genNewsId(), type: 'auto', icon: '👑',
          title: `小林Tが${label}を ${sec.teacherTime}秒 で更新！`,
          date: now
        });
      }
      const oldStuName = oldSec.studentBestName || '';
      const oldStuTime = oldSec.studentBestTime;
      const stuName = sec.studentBestName || '';
      const stuTime = sec.studentBestTime;
      if ((stuName !== oldStuName || stuTime !== oldStuTime) && stuName && stuTime != null) {
        news.push({
          id: genNewsId(), type: 'auto', icon: '🏅',
          title: `${stuName} が${label}を ${stuTime}秒 で更新！`,
          date: now
        });
      }
    }
  }

  if (news.length > 0) {
    if (!Array.isArray(questionsData.news)) questionsData.news = [];
    questionsData.news = [...news, ...questionsData.news].slice(0, 10);
    console.log('[NEWS自動生成]', news.length, '件追加:', news.map(n => n.title));
  }
}

// 保存後にスナップショットを更新（次回検知の基準にする）
function refreshSnapshot() {
  originalSnapshot = JSON.parse(JSON.stringify(questionsData));
}

function renderNewsAdmin() {
  const list = document.getElementById('news-admin-list');
  const news = questionsData.news || [];
  document.getElementById('news-admin-count').textContent = `${news.length}件 / 最大10件`;
  if (news.length === 0) {
    list.innerHTML = '<p style="color:rgba(255,255,255,0.4);font-size:0.85rem;padding:0.4rem 0">NEWS はまだありません。「＋ NEWS追加」で追加するか、生徒ベスト/先生タイムを更新すると自動で増えます。</p>';
    return;
  }
  list.innerHTML = news.map((n, i) => {
    const cls = n.type === 'auto' ? 'auto' : 'manual';
    const badgeText = n.type === 'auto' ? '自動' : '手動';
    const dateLabel = formatNewsDateAdmin(n.date);
    return `<div class="news-admin-row ${cls}">
      <input type="text" class="news-admin-icon-input" value="${escHtml(n.icon || '📌')}"
             onchange="updateNewsField(${i},'icon',this.value)" maxlength="4">
      <input type="text" class="news-admin-title-input" value="${escHtml(n.title || '')}"
             onchange="updateNewsField(${i},'title',this.value)">
      <span class="news-admin-type-badge ${cls}">${badgeText}</span>
      <span class="news-admin-date">${dateLabel}</span>
      <button class="news-admin-del-btn" title="削除" onclick="deleteNews(${i})">×</button>
    </div>`;
  }).join('');
}

function formatNewsDateAdmin(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return '';
  const m = d.getMonth() + 1, day = d.getDate();
  const hh = String(d.getHours()).padStart(2, '0');
  const mm = String(d.getMinutes()).padStart(2, '0');
  return `${m}/${day} ${hh}:${mm}`;
}

function updateNewsField(idx, field, val) {
  if (!questionsData.news || !questionsData.news[idx]) return;
  questionsData.news[idx][field] = val;
}

function addNewsManual() {
  if (!Array.isArray(questionsData.news)) questionsData.news = [];
  questionsData.news.unshift({
    id: genNewsId(), type: 'manual', icon: '📌',
    title: '', date: new Date().toISOString()
  });
  if (questionsData.news.length > 10) questionsData.news = questionsData.news.slice(0, 10);
  renderNewsAdmin();
  // 追加した行のタイトル入力にフォーカス
  const inputs = document.querySelectorAll('.news-admin-title-input');
  if (inputs.length > 0) inputs[0].focus();
}

function deleteNews(idx) {
  if (!questionsData.news) return;
  if (!confirm('このNEWSを削除しますか？')) return;
  questionsData.news.splice(idx, 1);
  renderNewsAdmin();
}

async function saveNews(btn) {
  const sta = document.getElementById('news-admin-save-status');
  btn.textContent = '保存中...';
  btn.disabled = true;
  try {
    const res = await fetch('/api/questions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: enteredPassword, adminPassword: enteredPassword, data: questionsData })
    });
    const r = await res.json();
    sta.textContent = r.ok ? '✓ 保存しました' : '❌ 失敗';
    sta.style.color = r.ok ? '#86efac' : '#ff6b6b';
    if (r.ok) refreshSnapshot();
  } catch(e) {
    sta.textContent = '❌ エラー';
    sta.style.color = '#ff6b6b';
  }
  btn.textContent = '💾 保存';
  btn.disabled = false;
  setTimeout(() => { sta.textContent = ''; }, 3000);
}

async function saveCmTeacherTime() {
  const el  = document.getElementById('cm-teacher-time-input');
  const sta = document.getElementById('cm-ts-status');
  const val = parseInt(el.value);
  if (!val || val < 1) { sta.textContent = '❌ 正しい秒数を入力してください'; return; }
  questionsData.cardMatchTeacherTime = val;
  detectAndPushNews();
  // questions.json 全体を保存
  const res = await fetch('/api/questions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: enteredPassword, adminPassword: enteredPassword, data: questionsData })
  });
  const r = await res.json();
  if (r.ok) { refreshSnapshot(); renderNewsAdmin(); }
  sta.textContent = r.ok ? `✓ ${val}秒に更新しました` : '❌ 保存失敗';
  setTimeout(() => { sta.textContent = ''; }, 3000);
}

async function saveCmStudentBest() {
  const nameEl = document.getElementById('cm-student-name-input');
  const timeEl = document.getElementById('cm-student-time-input');
  const sta    = document.getElementById('cm-sb-status');
  const name   = nameEl.value.trim();
  const val    = parseInt(timeEl.value);
  if (!name) { sta.textContent = '❌ 名前を入力してください'; setTimeout(() => { sta.textContent = ''; }, 3000); return; }
  if (!val || val < 1) { sta.textContent = '❌ 正しい秒数を入力してください'; setTimeout(() => { sta.textContent = ''; }, 3000); return; }
  questionsData.cardMatchStudentBestName = name;
  questionsData.cardMatchStudentBestTime = val;
  detectAndPushNews();
  const res = await fetch('/api/questions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: enteredPassword, adminPassword: enteredPassword, data: questionsData })
  });
  const r = await res.json();
  if (r.ok) { refreshSnapshot(); renderNewsAdmin(); }
  sta.textContent = r.ok ? `✓ ${name} ${val}秒に更新しました` : '❌ 保存失敗';
  setTimeout(() => { sta.textContent = ''; }, 3000);
}

// ===== 章タブ =====
function renderChapterTabs() {
  const area = document.getElementById('chapter-tabs');
  area.innerHTML = questionsData.chapters.map((ch, i) =>
    `<button class="chapter-tab${i === 0 ? ' active' : ''}"
             onclick="switchChapter(${i})" id="chtab-${i}">
       第${ch.id}章 ${ch.title}
     </button>`
  ).join('');
}

function switchChapter(idx) {
  currentChapter = idx;
  document.querySelectorAll('.chapter-tab').forEach((t, i) =>
    t.classList.toggle('active', i === idx)
  );
  renderSections(idx);
}

// ===== 節・問題一覧 =====
function renderSections(chIdx) {
  const ch = questionsData.chapters[chIdx];
  const area = document.getElementById('sections-area');

  if (!ch.sections || ch.sections.length === 0) {
    area.innerHTML = '<p style="color:rgba(255,255,255,0.4);text-align:center;padding:3rem">この章はまだ問題がありません</p>';
    return;
  }

  area.innerHTML = ch.sections.map((sec, si) => `
    <div class="section-panel">
      <div class="section-heading">
        <span style="opacity:0.45">${String(si+1).padStart(2,'0')}</span>
        ${sec.title}
        <div class="teacher-time-wrap">
          <span class="teacher-time-label">👑 小林Tタイム</span>
          <input type="number" class="teacher-time-input" min="0" step="0.1"
                 value="${sec.teacherTime != null ? sec.teacherTime : ''}"
                 placeholder="未設定"
                 onchange="updateTeacherTime(${chIdx},${si},this.value)"
                 title="タイムアタックで小林Tの記録として表示されます">
          <span class="teacher-time-unit">秒</span>
        </div>
        <div class="student-best-wrap">
          <span class="student-best-label">🏅 生徒ベスト</span>
          <input type="text" class="student-best-name-input"
                 value="${escHtml(sec.studentBestName || '')}"
                 placeholder="名前"
                 onchange="updateStudentBest(${chIdx},${si},'name',this.value)"

// ===== レベルタブ切り替え =====
function switchLevel(chIdx, si, li) {
  const tabsEl = document.getElementById(`ltabs-${chIdx}-${si}`);
  tabsEl.querySelectorAll('.level-tab').forEach((t, i) => t.classList.toggle('active', i === li));
  LEVEL_KEYS.forEach((_, i) => {
    const el = document.getElementById(`lv-${chIdx}-${si}-${i}`);
    if (el) el.style.display = i === li ? 'block' : 'none';
  });
}

// ===== 問題を削除 =====
function deleteQuestion(chIdx, si, li, qi) {
  const arr = questionsData.chapters[chIdx].sections[si][LEVEL_KEYS[li]];
  if (arr.length <= 1) {
    alert('問題が1問しかないため削除できません。');
    return;
  }
  if (!confirm(`問${qi + 1}「${arr[qi].q}」を削除しますか？`)) return;
  arr.splice(qi, 1);
  const activeLevels = captureActiveLevels();
  renderSections(currentChapter);
  restoreActiveLevels(activeLevels);
}

// ===== 問題を追加 =====
function addQuestion(chIdx, si, li) {
  questionsData.chapters[chIdx].sections[si][LEVEL_KEYS[li]].push({ q: '', a: '', b: '' });
  const activeLevels = captureActiveLevels();
  renderSections(currentChapter);
  restoreActiveLevels(activeLevels);
  // 追加した行の問題文入力欄にフォーカス
  const arr = questionsData.chapters[chIdx].sections[si][LEVEL_KEYS[li]];
  const newQi = arr.length - 1;
  const newInput = document.querySelector(
    `.q-input[data-ch="${chIdx}"][data-sec="${si}"][data-lv="${li}"][data-qi="${newQi}"]`
  );
  if (newInput) newInput.focus();
}

// ===== 生徒プレビュー生成 =====
function buildPreview(item) {
  const q = (item.q || '').trim();
  const a = (item.a || '').trim();
  const b = (item.b || '').trim();
  if (!q && !a) return '<span class="prev-empty">問題文・答えを入力してください</span>';
  if (b && a.includes(b)) {
    const hint = a.replace(b, '<span class="prev-blank">＿＿</span>');
    return `${escHtml(q)}<span class="prev-arrow">→</span>${hint}`;
  }
  if (b && !a.includes(b)) {
    // 穴埋めが答えの中に見つからない場合は警告表示
    return `${escHtml(q)}<span class="prev-arrow" style="color:#ff9999">⚠ 穴埋めが答えに含まれていません</span>`;
  }
  // 穴埋めなし：問題文をそのまま表示
  return escHtml(q);
}

// ===== 編集時にデータ更新 =====
function onEdit(input) {
  const ch = parseInt(input.dataset.ch);
  const si = parseInt(input.dataset.sec);
  const li = parseInt(input.dataset.lv);
  const qi = parseInt(input.dataset.qi);
  const field = input.dataset.field;
  questionsData.chapters[ch].sections[si][LEVEL_KEYS[li]][qi][field] = input.value;
  // プレビューをリアルタイム更新
  const prevEl = document.getElementById(`prev-${ch}-${si}-${li}-${qi}`);
  if (prevEl) {
    prevEl.innerHTML = buildPreview(questionsData.chapters[ch].sections[si][LEVEL_KEYS[li]][qi]);
  }
}

// ===== 共通因数ウォール 単項式計算ユーティリティ =====
function _gcd(a, b) { return b === 0 ? a : _gcd(b, a % b); }
function _mono(coef, vars) { return { coef, vars: vars || {} }; }
function _gcdMono(a, b) {
  const c = _gcd(Math.abs(a.coef), Math.abs(b.coef));
  const vars = {};
  for (const [l, e] of Object.entries(a.vars)) {
    if (b.vars[l]) vars[l] = Math.min(e, b.vars[l]);
  }
  return _mono(c, vars);
}
function _gcdAll(monos) { return monos.reduce((a, b) => _gcdMono(a, b)); }
const _SUP = {'0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹'};
function _toSuper(n) { return String(n).split('').map(c => _SUP[c]||c).join(''); }
function _monoToStr(m) {
  let s = '';
  const letters = Object.keys(m.vars).sort();
  if (m.coef !== 1 || letters.length === 0) s += m.coef;
  for (const l of letters) { s += l; if (m.vars[l] > 1) s += _toSuper(m.vars[l]); }
  return s;
}
function _parseMono(str) {
  if (!str) return { ok: false };
  let s = String(str).trim().toLowerCase();
  if (!s) return { ok: false };
  const supMap={'⁰':'^0','¹':'^1','²':'^2','³':'^3','⁴':'^4','⁵':'^5','⁶':'^6','⁷':'^7','⁸':'^8','⁹':'^9'};
  s = s.replace(/[⁰¹²³⁴⁵⁶⁷⁸⁹]/g, ch => supMap[ch]).replace(/[\s*・×]/g,'');
  let i = 0, coefStr = '';
  while (i < s.length && /[0-9]/.test(s[i])) { coefStr += s[i]; i++; }
  let coef = coefStr ? parseInt(coefStr, 10) : 1;
  if (coef <= 0) return { ok: false };
  const vars = {};
  while (i < s.length) {
    const c = s[i];
    if (!/[a-z]/.test(c)) return { ok: false };
    i++;
    let exp = 1;
    if (s[i] === '^') {
      i++;
      let expStr = '';
      while (i < s.length && /[0-9]/.test(s[i])) { expStr += s[i]; i++; }
      if (!expStr) return { ok: false };
      exp = parseInt(expStr, 10);
    }
    vars[c] = (vars[c] || 0) + exp;
  }
  return { ok: true, mono: _mono(coef, vars) };
}
function computeWallGcd(problem) {
  const terms = (problem.terms || []).filter(t => String(t).trim().length > 0);
  if (terms.length < 2) return null;
  const parsed = terms.map(t => _parseMono(t));
  if (parsed.some(r => !r.ok)) return null;
  const ans = _gcdAll(parsed.map(r => r.mono));
  if (ans.coef === 1 && Object.keys(ans.vars).length === 0) return null;
  return _monoToStr(ans);
}

// ===== 共通因数ウォール 問題管理 =====
let wallSectionOpen = false;
let currentWallLevel = 1; // 1, 2, 3, 'all'

// 表示中のレベルに該当する元配列のインデックス一覧を返す
function getWallVisibleIndices() {
  const arr = (questionsData && questionsData.wallProblems) || [];
  const out = [];
  for (let i = 0; i < arr.length; i++) {
    if (currentWallLevel === 'all' || arr[i].level === currentWallLevel) out.push(i);
  }
  return out;
}

function switchWallLevel(lv) {
  currentWallLevel = lv;
  document.querySelectorAll('.wall-lv-tab').forEach(t => {
    t.classList.toggle('active', String(t.getAttribute('data-lv')) === String(lv));
  });
  renderWallProblems();
}

function updateWallLevelCounts() {
  if (!questionsData || !questionsData.wallProblems) return;
  const arr = questionsData.wallProblems;
  const cnt = (lv) => arr.filter(p => p.level === lv).length;
  const set = (id, n) => { const e = document.getElementById(id); if (e) e.textContent = String(n); };
  set('wall-lv1-cnt', cnt(1));
  set('wall-lv2-cnt', cnt(2));
  set('wall-lv3-cnt', cnt(3));
  set('wall-lvall-cnt', arr.length);
}

function toggleWallSection() {
  wallSectionOpen = !wallSectionOpen;
  document.getElementById('wall-body').style.display = wallSectionOpen ? 'block' : 'none';
  document.getElementById('wall-toggle').textContent = wallSectionOpen ? '▲ 閉じる' : '▼ 開く';
}

function renderWallProblems() {
  if (!questionsData) return;
  const probs = questionsData.wallProblems || [];
  document.getElementById('wall-count').textContent = `${probs.length}問`;
  updateWallLevelCounts();
  const wrap = document.getElementById('wall-table-wrap');

  // 表示するインデックス（レベルでフィルタ）
  const visibleIdx = getWallVisibleIndices();

  if (probs.length === 0) {
    wrap.innerHTML = '<p style="color:rgba(255,255,255,0.4);padding:0.4rem 0;font-size:0.85rem">問題がありません。「＋ 問題を追加」で追加してください。</p>';
    return;
  }
  if (visibleIdx.length === 0) {
    wrap.innerHTML = `<p style="color:rgba(255,255,255,0.4);padding:0.4rem 0;font-size:0.85rem">Lv.${currentWallLevel} の問題はまだありません。「＋ 問題を追加」で追加してください。</p>`;
    return;
  }

  const showLevelBadge = (currentWallLevel === 'all');
  const lvColors = { 1:'#4ecdc4', 2:'#f7971e', 3:'#f5576c' };

  const rows = visibleIdx.map((i, displayIdx) => {
    const p = probs[i];
    const terms = p.terms || [];
    const has3 = terms.length >= 3;
    const t1 = escHtml(terms[0] || '');
    const t2 = escHtml(terms[1] || '');
    const t3 = has3 ? escHtml(terms[2] || '') : '';
    const gcdStr = computeWallGcd(p);
    const gcdCell = gcdStr
      ? `<span style="color:#ff8a2a;font-weight:800;font-family:monospace;font-size:1rem;">${escHtml(gcdStr)}</span>`
      : `<span style="color:rgba(255,255,255,0.2);font-size:0.78rem;">—</span>`;
    const lvBadge = showLevelBadge && p.level
      ? `<span style="display:inline-block;padding:1px 6px;border-radius:8px;background:${lvColors[p.level]||'#888'};color:#000;font-size:0.7rem;font-weight:800;margin-left:4px;">Lv${p.level}</span>`
      : '';
    return `<tr class="wall-row" id="wall-row-${i}" draggable="true"
               ondragstart="wallDragStart(event,${i})"
               ondragover="wallDragOver(event,${i})"
               ondragleave="wallDragLeave(event,${i})"
               ondrop="wallDragDrop(event,${i})"
               ondragend="wallDragEnd()">
      <td class="wall-drag-cell">
        <span class="wall-drag-handle" title="ドラッグして並び替え"
              onmousedown="wallDragFromHandle=true">⠿</span>
      </td>
      <td class="wall-num">${displayIdx + 1}${lvBadge}</td>
      <td><input class="wall-term-input" type="text" value="${t1}"
                 placeholder="例: 6ab"
                 onchange="updateWallTerm(${i},0,this.value);refreshWallGcd(${i})"></td>
      <td style="color:rgba(255,255,255,0.25);padding:0 0.1rem;font-size:0.85rem">，</td>
      <td><input class="wall-term-input" type="text" value="${t2}"
                 placeholder="例: 4ac"
                 onchange="updateWallTerm(${i},1,this.value);refreshWallGcd(${i})"></td>
      <td style="padding:0 0.2rem;">
        ${has3
          ? `<input class="wall-term-input" type="text" value="${t3}"
                    placeholder="例: 8bc"
                    onchange="updateWallTerm(${i},2,this.value);refreshWallGcd(${i})">`
          : ''}
        ${has3
          ? `<button class="wall-toggle-btn" onclick="removeWallTerm(${i})">−項</button>`
          : `<button class="wall-toggle-btn" onclick="addWallTerm(${i})">+項</button>`}
      </td>
      <td style="padding:0 0.5rem;text-align:center;min-width:60px;" id="wall-gcd-${i}">${gcdCell}</td>
      <td class="wall-del-cell">
        <button class="wall-del-btn" title="削除" onclick="deleteWallProblem(${i})">×</button>
      </td>
    </tr>`;
  }).join('');
  wrap.innerHTML = `<table class="wall-table">
    <thead>
      <tr>
        <th style="width:1.8rem;"></th>
        <th class="wall-num">#</th>
        <th>項1</th>
        <th></th>
        <th>項2</th>
        <th>項3（任意）</th>
        <th style="text-align:center;min-width:60px;">答え</th>
        <th></th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ===== 共通因数ウォール ドラッグ並び替え =====
let wallDragSrc = null;
let wallDragFromHandle = false;
document.addEventListener('mouseup', () => { wallDragFromHandle = false; });

function wallDragStart(e, idx) {
  if (!wallDragFromHandle) { e.preventDefault(); return; }
  wallDragSrc = idx;
  const row = document.getElementById(`wall-row-${idx}`);
  if (row) row.classList.add('wall-dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', String(idx));
}
function wallDragOver(e, idx) {
  e.preventDefault();
  if (wallDragSrc === null || wallDragSrc === idx) return;
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.wall-row.wall-drag-over').forEach(r => r.classList.remove('wall-drag-over'));
  const row = document.getElementById(`wall-row-${idx}`);
  if (row) row.classList.add('wall-drag-over');
}
function wallDragLeave(e, idx) {
  const row = document.getElementById(`wall-row-${idx}`);
  if (row) row.classList.remove('wall-drag-over');
}
function wallDragDrop(e, idx) {
  e.stopPropagation();
  e.preventDefault();
  document.querySelectorAll('.wall-row').forEach(r => r.classList.remove('wall-drag-over', 'wall-dragging'));
  if (wallDragSrc === null || wallDragSrc === idx) return;
  const arr = questionsData.wallProblems;
  const [removed] = arr.splice(wallDragSrc, 1);
  arr.splice(idx, 0, removed);
  wallDragSrc = null;
  renderWallProblems();
}
function wallDragEnd() {
  document.querySelectorAll('.wall-row').forEach(r => r.classList.remove('wall-drag-over', 'wall-dragging'));
  wallDragFromHandle = false;
  wallDragSrc = null;
}

function refreshWallGcd(idx) {
  if (!questionsData.wallProblems) return;
  const p = questionsData.wallProblems[idx];
  if (!p) return;
  const cell = document.getElementById(`wall-gcd-${idx}`);
  if (!cell) return;
  const gcdStr = computeWallGcd(p);
  cell.innerHTML = gcdStr
    ? `<span style="color:#ff8a2a;font-weight:800;font-family:monospace;font-size:1rem;">${escHtml(gcdStr)}</span>`
    : `<span style="color:rgba(255,255,255,0.2);font-size:0.78rem;">—</span>`;
}

function updateWallTerm(idx, ti, val) {
  if (!questionsData.wallProblems) questionsData.wallProblems = [];
  const p = questionsData.wallProblems[idx];
  if (!p) return;
  while (p.terms.length <= ti) p.terms.push('');
  p.terms[ti] = val.trim();
}

function addWallTerm(idx) {
  if (!questionsData.wallProblems) return;
  const p = questionsData.wallProblems[idx];
  if (!p || p.terms.length >= 3) return;
  p.terms.push('');
  renderWallProblems();
}

function removeWallTerm(idx) {
  if (!questionsData.wallProblems) return;
  const p = questionsData.wallProblems[idx];
  if (!p) return;
  p.terms = p.terms.slice(0, 2);
  renderWallProblems();
}

function addWallProblem() {
  if (!questionsData.wallProblems) questionsData.wallProblems = [];
  const arr = questionsData.wallProblems;
  // 新規問題の level を決める
  const lv = (currentWallLevel === 'all') ? 1 : currentWallLevel;
  const newProb = { level: lv, terms: ['', ''] };

  if (currentWallLevel === 'all') {
    // 全部表示中: 末尾に追加
    arr.push(newProb);
  } else {
    // 同レベル問題の末尾の次に挿入
    let insertAt = -1;
    for (let i = arr.length - 1; i >= 0; i--) {
      if (arr[i].level === lv) { insertAt = i + 1; break; }
    }
    // 同レベルが空 → 次のレベルの先頭、なければ末尾
    if (insertAt === -1) {
      insertAt = arr.length;
      for (let i = 0; i < arr.length; i++) {
        if (arr[i].level && arr[i].level > lv) { insertAt = i; break; }
      }
    }
    arr.splice(insertAt, 0, newProb);
  }
  renderWallProblems();
  // 追加した行の1つ目の入力にフォーカス
  const inputs = document.querySelectorAll('.wall-term-input');
  if (inputs.length >= 2) inputs[inputs.length - 2].focus();
}

function deleteWallProblem(idx) {
  if (!questionsData.wallProblems) return;
  const prob = questionsData.wallProblems[idx];
  const label = (prob.terms || []).filter(Boolean).join('，') || `問題${idx + 1}`;
  if (!confirm(`「${label}」を削除しますか？`)) return;
  questionsData.wallProblems.splice(idx, 1);
  renderWallProblems();
}

async function saveWallProblems(btn) {
  const sta = document.getElementById('wall-save-status');
  btn.textContent = '保存中...';
  btn.disabled = true;
  try {
    const res = await fetch('/api/questions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: enteredPassword, adminPassword: enteredPassword, data: questionsData })
    });
    const r = await res.json();
    sta.textContent = r.ok ? '✓ 保存しました' : '❌ 失敗';
    sta.style.color = r.ok ? '#86efac' : '#ff6b6b';
  } catch(e) {
    sta.textContent = '❌ エラー';
    sta.style.color = '#ff6b6b';
  }
  btn.textContent = '💾 保存';
  btn.disabled = false;
  setTimeout(() => { sta.textContent = ''; }, 3000);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// ===== ドラッグ並び替え =====
let dragSrc = null;
let dragFromHandle = false;   // ハンドル（⠿）から始めたときだけ true

// ハンドル以外でのマウスアップでフラグをリセット
document.addEventListener('mouseup', () => { dragFromHandle = false; });

// 現在アクティブなレベルタブを記録して返す
function captureActiveLevels() {
  const result = {};
  document.querySelectorAll('.level-tabs').forEach(tabsEl => {
    const m = tabsEl.id.match(/ltabs-(\d+)-(\d+)/);
    if (!m) return;
    const si = parseInt(m[2]);
    const tabs = tabsEl.querySelectorAll('.level-tab');
    const activeLi = Array.from(tabs).findIndex(t => t.classList.contains('active'));
    result[si] = activeLi >= 0 ? activeLi : 0;
  });
  return result;
}

// 記録したタブ状態を復元する
function restoreActiveLevels(activeLevels) {
  Object.entries(activeLevels).forEach(([si, li]) => {
    switchLevel(currentChapter, parseInt(si), li);
  });
}

function dragStart(e, el) {
  // ドラッグハンドル（⠿）からのみ並び替えを許可する
  if (!dragFromHandle) {
    e.preventDefault();
    return;
  }
  dragSrc = el;
  el.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', el.dataset.qi);
}

function dragOver(e, el) {
  e.preventDefault();
  if (!dragSrc || el === dragSrc) return;
  // 同じ章・節・レベル内のみ許可
  if (el.dataset.ch  !== dragSrc.dataset.ch  ||
      el.dataset.sec !== dragSrc.dataset.sec ||
      el.dataset.lv  !== dragSrc.dataset.lv) return;
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.q-row.drag-over').forEach(r => r.classList.remove('drag-over'));
  el.classList.add('drag-over');
}

function dragLeave(e, el) {
  el.classList.remove('drag-over');
}

function dragDrop(e, el) {
  e.stopPropagation();
  e.preventDefault();
  document.querySelectorAll('.q-row').forEach(r => r.classList.remove('drag-over', 'dragging'));
  if (!dragSrc || dragSrc === el) return;
  if (el.dataset.ch  !== dragSrc.dataset.ch  ||
      el.dataset.sec !== dragSrc.dataset.sec ||
      el.dataset.lv  !== dragSrc.dataset.lv) return;

  const ch    = parseInt(dragSrc.dataset.ch);
  const sec   = parseInt(dragSrc.dataset.sec);
  const lv    = parseInt(dragSrc.dataset.lv);
  const srcQi = parseInt(dragSrc.dataset.qi);
  const dstQi = parseInt(el.dataset.qi);

  // 配列を並び替え
  const arr = questionsData.chapters[ch].sections[sec][LEVEL_KEYS[lv]];
  const [removed] = arr.splice(srcQi, 1);
  arr.splice(dstQi, 0, removed);

  // タブ状態を保存してから再描画・復元
  const activeLevels = captureActiveLevels();
  renderSections(currentChapter);
  restoreActiveLevels(activeLevels);
}

function dragEnd() {
  document.querySelectorAll('.q-row').forEach(r => r.classList.remove('drag-over', 'dragging'));
  dragFromHandle = false;
}
</script>
