<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 - 数学プリントHP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #0d0d2b; color: white; min-height: 100vh; }

    /* ===== ログイン画面 ===== */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: #16163a; border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px; padding: 3rem 2.5rem; width: min(380px, 92vw);
      text-align: center; box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }
    .login-card h1 { font-size: 1.5rem; margin-bottom: 0.4rem; }
    .login-card p { color: rgba(255,255,255,0.5); font-size: 0.88rem; margin-bottom: 2rem; }
    .login-input {
      width: 100%; padding: 0.85rem 1rem; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: white;
      font-size: 1.1rem; text-align: center; outline: none; letter-spacing: 0.2em;
      font-family: inherit; margin-bottom: 1rem;
    }
    .login-btn {
      width: 100%; padding: 0.85rem; background: linear-gradient(135deg, #667eea, #764ba2);
      border: none; border-radius: 12px; color: white; font-size: 1rem;
      font-weight: 800; font-family: inherit; cursor: pointer;
    }
    .login-btn:hover { filter: brightness(1.1); }
    .login-error { color: #ff6b6b; font-size: 0.85rem; margin-top: 0.6rem; display: none; }

    /* ===== 管理画面 ===== */
    #admin-screen { display: none; }
    .admin-header {
      background: #16163a; border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .admin-header h1 { font-size: 1.1rem; }
    .save-all-btn {
      padding: 0.6rem 1.6rem; background: linear-gradient(135deg, #56ab2f, #a8e063);
      border: none; border-radius: 50px; color: #0d0d2b; font-size: 0.9rem;
      font-weight: 800; font-family: inherit; cursor: pointer;
    }
    .save-all-btn:hover { filter: brightness(1.1); }
    .import-btn {
      padding: 0.6rem 1.6rem; background: linear-gradient(135deg, #f093fb, #f5576c);
      border: none; border-radius: 50px; color: white; font-size: 0.9rem;
      font-weight: 800; font-family: inherit; cursor: pointer; margin-left: 0.7rem;
    }
    .import-btn:hover { filter: brightness(1.15); }
    .import-btn:disabled { opacity: 0.5; cursor: not-allowed; filter: none; }
    .push-btn {
      padding: 0.6rem 1.6rem; background: linear-gradient(135deg, #667eea, #764ba2);
      border: none; border-radius: 50px; color: white; font-size: 0.9rem;
      font-weight: 800; font-family: inherit; cursor: pointer; margin-left: 0.7rem;
    }
    .push-btn:hover { filter: brightness(1.15); }
    .push-btn:disabled { opacity: 0.5; cursor: not-allowed; filter: none; }
    .save-status {
      font-size: 0.82rem; color: #9ded62; margin-left: 1rem; display: none;
    }
    .push-status {
      font-size: 0.82rem; margin-left: 0.8rem; display: none;
    }

    /* ===== コンテンツ ===== */
    .admin-content { max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    /* ===== 章タブ ===== */
    .chapter-tabs { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 2rem; }
    .chapter-tab {
      padding: 0.5rem 1.2rem; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7);
      font-size: 0.85rem; cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .chapter-tab.active { background: linear-gradient(135deg, #667eea, #764ba2); border-color: transparent; color: white; font-weight: 700; }

    /* ===== 節パネル ===== */
    .section-panel { margin-bottom: 2rem; }
    .section-heading {
      font-size: 1.1rem; font-weight: 800; padding: 0.8rem 1.2rem;
      background: rgba(255,255,255,0.06); border-radius: 12px 12px 0 0;
      border: 1px solid rgba(255,255,255,0.1); border-bottom: none;
      display: flex; align-items: center; gap: 0.6rem;
    }
    .section-body {
      border: 1px solid rgba(255,255,255,0.1); border-radius: 0 0 12px 12px; overflow: hidden;
    }

    /* ===== 小テストパスワード表示 ===== */
    .minitest-pw-wrap {
      margin-left: auto; display: flex; align-items: center; gap: 0.5rem;
      background: rgba(255,213,0,0.12); border: 1px solid rgba(255,213,0,0.3);
      border-radius: 8px; padding: 0.2rem 0.7rem; font-size: 0.82rem;
    }
    .minitest-pw-label { color: rgba(255,255,255,0.5); }
    .minitest-pw-code {
      font-size: 1rem; font-weight: 800; color: #ffd200;
      letter-spacing: 0.18em; font-family: monospace;
    }
    .minitest-pw-regen {
      background: none; border: none; cursor: pointer; font-size: 0.9rem;
      padding: 0 0.2rem; opacity: 0.6; transition: opacity 0.15s;
    }
    .minitest-pw-regen:hover { opacity: 1; }

    /* ===== レベルタブ ===== */
    .level-tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .level-tab {
      flex: 1; padding: 0.6rem; text-align: center; font-size: 0.82rem;
      cursor: pointer; font-family: inherit; border: none; font-weight: 700;
      transition: background 0.2s;
    }
    .level-tab[data-lv="0"] { background: rgba(78,205,196,0.12); color: #4ecdc4; }
    .level-tab[data-lv="1"] { background: rgba(247,151,30,0.12); color: #f7971e; }
    .level-tab[data-lv="2"] { background: rgba(245,87,108,0.12); color: #f5576c; }
    .level-tab.active[data-lv="0"] { background: rgba(78,205,196,0.3); }
    .level-tab.active[data-lv="1"] { background: rgba(247,151,30,0.3); }
    .level-tab.active[data-lv="2"] { background: rgba(245,87,108,0.3); }

    /* ===== 問題テーブル ===== */
    .questions-table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.02); }
    .questions-table th {
      padding: 0.6rem 1rem; font-size: 0.78rem; color: rgba(255,255,255,0.45);
      text-align: left; border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03); font-weight: 500;
    }
    .questions-table td { padding: 0.5rem 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.06); vertical-align: middle; }
    .q-num { font-size: 0.78rem; color: rgba(255,255,255,0.4); width: 2.5rem; }
    .q-input {
      width: 100%; padding: 0.45rem 0.7rem; background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: white;
      font-size: 0.88rem; font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    .q-input:focus { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.1); }
    .a-input {
      width: 120px; padding: 0.45rem 0.7rem; background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: #9ded62;
      font-size: 0.88rem; font-family: inherit; outline: none; transition: border-color 0.2s;
      font-weight: 700;
    }
    .a-input:focus { border-color: rgba(100,230,100,0.5); }
    .b-input {
      width: 140px; padding: 0.45rem 0.7rem; background: rgba(255,255,255,0.07);
      border: 1px dashed rgba(255,200,80,0.35); border-radius: 8px; color: #ffd580;
      font-size: 0.88rem; font-family: inherit; outline: none; transition: border-color 0.2s;
    }
    .b-input:focus { border-color: rgba(255,200,80,0.7); background: rgba(255,200,80,0.08); }
    .b-input::placeholder { color: rgba(255,200,80,0.3); }
    .questions-table tr:last-child td { border-bottom: none; }

    /* ===== ドラッグ並び替え ===== */
    .drag-th  { width: 2rem; }
    .drag-cell { width: 2rem; text-align: center; padding: 0.3rem 0.2rem !important; }
    .drag-handle {
      display: inline-block; cursor: grab; font-size: 1.15rem;
      color: rgba(255,255,255,0.28); user-select: none; padding: 0 0.25rem;
      transition: color 0.15s;
    }
    .drag-handle:hover { color: rgba(255,255,255,0.75); }
    .drag-handle:active { cursor: grabbing; }
    tr.q-row { transition: background 0.1s; }
    tr.q-row.dragging { opacity: 0.3; }
    tr.q-row.drag-over td { box-shadow: inset 0 3px 0 #667eea; }
    tr.q-row.drag-over { background: rgba(102,126,234,0.15) !important; }

    /* ===== 削除ボタン ===== */
    .del-th  { width: 2.2rem; }
    .del-cell { width: 2.2rem; text-align: center; padding: 0.3rem 0.2rem !important; }
    .del-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 1.55rem; height: 1.55rem; border-radius: 50%;
      background: rgba(255,80,80,0.15); border: 1px solid rgba(255,80,80,0.3);
      color: rgba(255,100,100,0.7); font-size: 0.9rem; cursor: pointer;
      font-family: inherit; line-height: 1; transition: all 0.15s;
    }
    .del-btn:hover { background: rgba(255,80,80,0.35); color: #ff6b6b; border-color: #ff6b6b; }

    /* ===== 生徒プレビュー列 ===== */
    .prev-th { min-width: 180px; }
    .prev-cell { padding: 0.4rem 0.8rem !important; vertical-align: middle; }
    .prev-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 0.35rem 0.65rem;
      font-size: 0.83rem;
      line-height: 1.6;
      min-height: 2rem;
      color: rgba(255,255,255,0.85);
      word-break: break-all;
    }
    .prev-arrow {
      color: rgba(255,255,255,0.35);
      margin: 0 0.3em;
      font-size: 0.78rem;
    }
    .prev-blank {
      color: #67e8ff;
      font-weight: 800;
      letter-spacing: 0.05em;
    }
    .prev-empty { color: rgba(255,255,255,0.2); font-style: italic; font-size: 0.78rem; }

    /* ===== 問題追加ボタン ===== */
    .add-q-btn {
      display: block; width: calc(100% - 1.6rem); margin: 0.5rem 0.8rem;
      padding: 0.4rem; background: rgba(255,255,255,0.04);
      border: 1px dashed rgba(255,255,255,0.18); border-radius: 8px;
      color: rgba(255,255,255,0.45); font-size: 0.82rem; cursor: pointer;
      font-family: inherit; transition: all 0.15s; text-align: center;
    }
    .add-q-btn:hover { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.8); }

    /* ===== 分数ヒント ===== */
    .frac-hint {
      font-size: 0.75rem; color: rgba(255,255,255,0.38);
      padding: 0.3rem 1rem 0.5rem; letter-spacing: 0.03em;
    }
    .frac-hint code {
      background: rgba(255,255,255,0.08); border-radius: 4px;
      padding: 0.05rem 0.35rem; color: rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-card">
    <h1>🔐 管理画面</h1>
    <p>先生用パスワードを入力してください</p>
    <input type="password" id="pw-input" class="login-input" placeholder="パスワード" autocomplete="off">
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div id="login-error" class="login-error">パスワードが違います</div>
  </div>
</div>

<!-- 管理画面 -->
<div id="admin-screen" style="display:none">
  <div class="admin-header">
    <h1>📝 問題管理画面</h1>
    <div style="display:flex;align-items:center">
      <span id="push-status" class="push-status"></span>
      <span id="save-status" class="save-status">✓ 保存しました</span>
      <button class="import-btn" id="import-btn" onclick="importFromExcel()">📥 Excelから取り込む</button>
      <button class="save-all-btn" onclick="saveAll()">💾 保存する</button>
      <button class="push-btn" id="push-btn" onclick="saveAndPush()">🚀 GitHubに反映</button>
    </div>
  </div>
  <div class="admin-content">
    <div class="chapter-tabs" id="chapter-tabs"></div>
    <div id="sections-area"></div>
  </div>
</div>

<script>
// ===== 設定 =====
const ADMIN_PASSWORD = 'sensei2024';  // ← パスワードをここで変更できます

const LEVEL_LABELS = ['★ 基礎レベル', '★★ 標準レベル', '★★★ 応用レベル'];
const LEVEL_KEYS   = ['basic', 'standard', 'advanced'];

let questionsData = null;
let currentChapter = 0;
let enteredPassword = '';

// ===== ログイン =====
function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === ADMIN_PASSWORD) {
    enteredPassword = pw;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadQuestions();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ===== 旧フォーマット → 新フォーマット自動変換 =====
// 旧: { q: "X = Y＿＿Z", a: "blank" }
// 新: { q: "X", a: "Yblank Z", b: "blank" }
function migrateToNewFormat(data) {
  data.chapters.forEach(ch => {
    (ch.sections || []).forEach(sec => {
      ['basic', 'standard', 'advanced'].forEach(key => {
        (sec[key] || []).forEach(item => {
          if (item.b !== undefined) return; // すでに新フォーマット
          const q = item.q || '';
          const a = item.a || '';
          if (!q.includes('＿＿')) {
            item.b = '';
            return;
          }
          const eqIdx = q.indexOf(' = ');
          if (eqIdx !== -1) {
            // "左辺 = 右辺＿＿" パターン
            const leftQ    = q.substring(0, eqIdx).trim();
            const rightPart = q.substring(eqIdx + 3).trim();
            item.q = leftQ;
            item.a = rightPart.replace('＿＿', a);
            item.b = a;
          } else {
            // "〜の係数は ＿＿" など＝なしパターン
            const blankIdx = q.indexOf('＿＿');
            item.q = q.substring(0, blankIdx).trim();
            // a（答え全体）はそのまま、穴埋めなし
            item.b = '';
          }
        });
      });
    });
  });
  return data;
}

// ===== ランダム4桁パスワード生成 =====
function genPassword() {
  return String(Math.floor(Math.random() * 9000) + 1000);
}

// 未設定の節にパスワードを自動付与
function ensurePasswords(data) {
  data.chapters.forEach(ch => {
    (ch.sections || []).forEach(sec => {
      if (!sec.miniTestPassword) sec.miniTestPassword = genPassword();
    });
  });
  return data;
}

// パスワード再生成ボタン
function regenPassword(chIdx, si) {
  const newPw = genPassword();
  questionsData.chapters[chIdx].sections[si].miniTestPassword = newPw;
  const el = document.getElementById(`pw-display-${chIdx}-${si}`);
  if (el) {
    el.textContent = newPw;
    el.style.transition = 'color 0s';
    el.style.color = '#ff9f43';
    setTimeout(() => { el.style.transition = 'color 0.6s'; el.style.color = '#ffd200'; }, 300);
  }
}

// ===== 問題データ読み込み =====
async function loadQuestions() {
  const res = await fetch('/api/questions');
  questionsData = ensurePasswords(migrateToNewFormat(await res.json()));
  renderChapterTabs();
  renderSections(0);
}

// ===== 章タブ =====
function renderChapterTabs() {
  const area = document.getElementById('chapter-tabs');
  area.innerHTML = questionsData.chapters.map((ch, i) =>
    `<button class="chapter-tab${i === 0 ? ' active' : ''}"
             onclick="switchChapter(${i})" id="chtab-${i}">
       第${ch.id}章 ${ch.title}
     </button>`
  ).join('');
}

function switchChapter(idx) {
  currentChapter = idx;
  document.querySelectorAll('.chapter-tab').forEach((t, i) =>
    t.classList.toggle('active', i === idx)
  );
  renderSections(idx);
}

// ===== 節・問題一覧 =====
function renderSections(chIdx) {
  const ch = questionsData.chapters[chIdx];
  const area = document.getElementById('sections-area');

  if (!ch.sections || ch.sections.length === 0) {
    area.innerHTML = '<p style="color:rgba(255,255,255,0.4);text-align:center;padding:3rem">この章はまだ問題がありません</p>';
    return;
  }

  area.innerHTML = ch.sections.map((sec, si) => `
    <div class="section-panel">
      <div class="section-heading">
        <span style="opacity:0.45">${String(si+1).padStart(2,'0')}</span>
        ${sec.title}
        <div class="minitest-pw-wrap">
          <span class="minitest-pw-label">小テストPW</span>
          <span class="minitest-pw-code" id="pw-display-${chIdx}-${si}">${sec.miniTestPassword || '----'}</span>
          <button class="minitest-pw-regen" title="パスワードを再生成"
                  onclick="regenPassword(${chIdx},${si})">🔄</button>
        </div>
      </div>
      <div class="section-body">
        <div class="level-tabs" id="ltabs-${chIdx}-${si}">
          ${LEVEL_LABELS.map((label, li) =>
            `<button class="level-tab${li === 0 ? ' active' : ''}" data-lv="${li}"
                     onclick="switchLevel(${chIdx},${si},${li})">${label}</button>`
          ).join('')}
        </div>
        ${LEVEL_KEYS.map((key, li) => `
          <div id="lv-${chIdx}-${si}-${li}" style="display:${li === 0 ? 'block' : 'none'}">
            <table class="questions-table">
              <thead>
                <tr>
                  <th class="drag-th"></th>
                  <th class="q-num">#</th>
                  <th>問題文　<span class="frac-hint">分数は <code>{分子/分母}</code> 例：<code>{x/2}</code></span></th>
                  <th>答え（全体）</th>
                  <th>穴埋め　<span class="frac-hint">省略可</span></th>
                  <th class="prev-th">👁 生徒に表示される問題</th>
                  <th class="del-th"></th>
                </tr>
              </thead>
              <tbody>
                ${sec[key].map((item, qi) => `
                  <tr class="q-row" draggable="true"
                      data-ch="${chIdx}" data-sec="${si}" data-lv="${li}" data-qi="${qi}"
                      ondragstart="dragStart(event,this)"
                      ondragover="dragOver(event,this)"
                      ondragleave="dragLeave(event,this)"
                      ondrop="dragDrop(event,this)"
                      ondragend="dragEnd()">
                    <td class="drag-cell"><span class="drag-handle" title="ドラッグして並び替え" onmousedown="dragFromHandle=true">⠿</span></td>
                    <td class="q-num">${qi + 1}</td>
                    <td><input class="q-input" type="text" value="${escHtml(item.q)}"
                               data-ch="${chIdx}" data-sec="${si}" data-lv="${li}" data-qi="${qi}" data-field="q"
                               draggable="false" oninput="onEdit(this)"></td>
                    <td><input class="a-input" type="text" value="${escHtml(item.a)}"
                               data-ch="${chIdx}" data-sec="${si}" data-lv="${li}" data-qi="${qi}" data-field="a"
                               draggable="false" oninput="onEdit(this)"></td>
                    <td><input class="b-input" type="text" value="${escHtml(item.b || '')}"
                               data-ch="${chIdx}" data-sec="${si}" data-lv="${li}" data-qi="${qi}" data-field="b"
                               draggable="false" oninput="onEdit(this)"></td>
                    <td class="prev-cell">
                      <div class="prev-box" id="prev-${chIdx}-${si}-${li}-${qi}">${buildPreview(item)}</div>
                    </td>
                    <td class="del-cell">
                      <button class="del-btn" title="この問題を削除"
                              onclick="deleteQuestion(${chIdx},${si},${li},${qi})">×</button>
                    </td>
                  </tr>`).join('')}
              </tbody>
            </table>
            <button class="add-q-btn" onclick="addQuestion(${chIdx},${si},${li})">＋ 問題を追加</button>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

// ===== レベルタブ切り替え =====
function switchLevel(chIdx, si, li) {
  const tabsEl = document.getElementById(`ltabs-${chIdx}-${si}`);
  tabsEl.querySelectorAll('.level-tab').forEach((t, i) => t.classList.toggle('active', i === li));
  LEVEL_KEYS.forEach((_, i) => {
    const el = document.getElementById(`lv-${chIdx}-${si}-${i}`);
    if (el) el.style.display = i === li ? 'block' : 'none';
  });
}

// ===== 問題を削除 =====
function deleteQuestion(chIdx, si, li, qi) {
  const arr = questionsData.chapters[chIdx].sections[si][LEVEL_KEYS[li]];
  if (arr.length <= 1) {
    alert('問題が1問しかないため削除できません。');
    return;
  }
  if (!confirm(`問${qi + 1}「${arr[qi].q}」を削除しますか？`)) return;
  arr.splice(qi, 1);
  const activeLevels = captureActiveLevels();
  renderSections(currentChapter);
  restoreActiveLevels(activeLevels);
}

// ===== 問題を追加 =====
function addQuestion(chIdx, si, li) {
  questionsData.chapters[chIdx].sections[si][LEVEL_KEYS[li]].push({ q: '', a: '', b: '' });
  const activeLevels = captureActiveLevels();
  renderSections(currentChapter);
  restoreActiveLevels(activeLevels);
  // 追加した行の問題文入力欄にフォーカス
  const arr = questionsData.chapters[chIdx].sections[si][LEVEL_KEYS[li]];
  const newQi = arr.length - 1;
  const newInput = document.querySelector(
    `.q-input[data-ch="${chIdx}"][data-sec="${si}"][data-lv="${li}"][data-qi="${newQi}"]`
  );
  if (newInput) newInput.focus();
}

// ===== 生徒プレビュー生成 =====
function buildPreview(item) {
  const q = (item.q || '').trim();
  const a = (item.a || '').trim();
  const b = (item.b || '').trim();
  if (!q && !a) return '<span class="prev-empty">問題文・答えを入力してください</span>';
  if (b && a.includes(b)) {
    const hint = a.replace(b, '<span class="prev-blank">＿＿</span>');
    return `${escHtml(q)}<span class="prev-arrow">→</span>${hint}`;
  }
  if (b && !a.includes(b)) {
    // 穴埋めが答えの中に見つからない場合は警告表示
    return `${escHtml(q)}<span class="prev-arrow" style="color:#ff9999">⚠ 穴埋めが答えに含まれていません</span>`;
  }
  // 穴埋めなし：問題文をそのまま表示
  return escHtml(q);
}

// ===== 編集時にデータ更新 =====
function onEdit(input) {
  const ch = parseInt(input.dataset.ch);
  const si = parseInt(input.dataset.sec);
  const li = parseInt(input.dataset.lv);
  const qi = parseInt(input.dataset.qi);
  const field = input.dataset.field;
  questionsData.chapters[ch].sections[si][LEVEL_KEYS[li]][qi][field] = input.value;
  // プレビューをリアルタイム更新
  const prevEl = document.getElementById(`prev-${ch}-${si}-${li}-${qi}`);
  if (prevEl) {
    prevEl.innerHTML = buildPreview(questionsData.chapters[ch].sections[si][LEVEL_KEYS[li]][qi]);
  }
}

// ===== 保存 =====
async function saveAll() {
  const btn = document.querySelector('.save-all-btn');
  btn.textContent = '保存中...';
  btn.disabled = true;

  try {
    const res = await fetch('/api/questions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        password: enteredPassword,
        adminPassword: enteredPassword,
        data: questionsData
      })
    });
    const result = await res.json();
    if (result.ok) {
      const status = document.getElementById('save-status');
      status.style.display = 'inline';
      setTimeout(() => status.style.display = 'none', 3000);
    } else {
      alert('保存に失敗しました: ' + result.error);
    }
  } catch (e) {
    alert('通信エラー: ' + e.message);
  }

  btn.textContent = '💾 保存する';
  btn.disabled = false;
}

// ===== Excelから取り込む =====
async function importFromExcel() {
  const btn = document.getElementById('import-btn');
  const status = document.getElementById('push-status');
  if (!confirm('②問題データ.xlsx の内容を questions.json に取り込みます。\n管理画面の現在の内容は上書きされます。よろしいですか？')) return;

  btn.textContent = '📥 変換中...';
  btn.disabled = true;
  status.style.cssText = 'display:inline; color:rgba(255,255,255,0.5);';
  status.textContent = 'Excelを読み込んでいます...';

  try {
    const res = await fetch('/api/import-excel', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: enteredPassword })
    });
    const result = await res.json();
    if (result.ok) {
      status.style.cssText = 'display:inline; color:#9ded62;';
      status.textContent = '✓ ' + result.message;
      setTimeout(() => { status.style.display = 'none'; }, 5000);
      // 画面を最新データで再読み込み
      await loadQuestions();
    } else {
      status.style.cssText = 'display:inline; color:#ff6b6b;';
      status.textContent = '✗ エラー: ' + result.error;
    }
  } catch (e) {
    status.style.cssText = 'display:inline; color:#ff6b6b;';
    status.textContent = '✗ 通信エラー: ' + e.message;
  }

  btn.textContent = '📥 Excelから取り込む';
  btn.disabled = false;
}

// ===== 保存 → GitHub push =====
async function saveAndPush() {
  const btn = document.getElementById('push-btn');
  const status = document.getElementById('push-status');

  // まず保存
  btn.textContent = '💾 保存中...';
  btn.disabled = true;
  status.style.display = 'none';

  const saveRes = await fetch('/api/questions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: enteredPassword, adminPassword: enteredPassword, data: questionsData })
  });
  const saveResult = await saveRes.json();
  if (!saveResult.ok) {
    alert('保存に失敗しました: ' + saveResult.error);
    btn.textContent = '🚀 GitHubに反映';
    btn.disabled = false;
    return;
  }

  // push
  btn.textContent = '🚀 Push中...';
  status.style.cssText = 'display:inline; color: rgba(255,255,255,0.5);';
  status.textContent = 'GitHubに送信しています...';

  try {
    const pushRes = await fetch('/api/git-push', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: enteredPassword })
    });
    const pushResult = await pushRes.json();
    if (pushResult.ok) {
      status.style.cssText = 'display:inline; color: #9ded62;';
      status.textContent = '✓ 生徒の画面に反映しました！';
      setTimeout(() => { status.style.display = 'none'; }, 4000);
    } else {
      status.style.cssText = 'display:inline; color: #ff6b6b;';
      status.textContent = '✗ エラー: ' + pushResult.error;
    }
  } catch (e) {
    status.style.cssText = 'display:inline; color: #ff6b6b;';
    status.textContent = '✗ 通信エラー: ' + e.message;
  }

  btn.textContent = '🚀 GitHubに反映';
  btn.disabled = false;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// ===== ドラッグ並び替え =====
let dragSrc = null;
let dragFromHandle = false;   // ハンドル（⠿）から始めたときだけ true

// ハンドル以外でのマウスアップでフラグをリセット
document.addEventListener('mouseup', () => { dragFromHandle = false; });

// 現在アクティブなレベルタブを記録して返す
function captureActiveLevels() {
  const result = {};
  document.querySelectorAll('.level-tabs').forEach(tabsEl => {
    const m = tabsEl.id.match(/ltabs-(\d+)-(\d+)/);
    if (!m) return;
    const si = parseInt(m[2]);
    const tabs = tabsEl.querySelectorAll('.level-tab');
    const activeLi = Array.from(tabs).findIndex(t => t.classList.contains('active'));
    result[si] = activeLi >= 0 ? activeLi : 0;
  });
  return result;
}

// 記録したタブ状態を復元する
function restoreActiveLevels(activeLevels) {
  Object.entries(activeLevels).forEach(([si, li]) => {
    switchLevel(currentChapter, parseInt(si), li);
  });
}

function dragStart(e, el) {
  // ドラッグハンドル（⠿）からのみ並び替えを許可する
  if (!dragFromHandle) {
    e.preventDefault();
    return;
  }
  dragSrc = el;
  el.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', el.dataset.qi);
}

function dragOver(e, el) {
  e.preventDefault();
  if (!dragSrc || el === dragSrc) return;
  // 同じ章・節・レベル内のみ許可
  if (el.dataset.ch  !== dragSrc.dataset.ch  ||
      el.dataset.sec !== dragSrc.dataset.sec ||
      el.dataset.lv  !== dragSrc.dataset.lv) return;
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.q-row.drag-over').forEach(r => r.classList.remove('drag-over'));
  el.classList.add('drag-over');
}

function dragLeave(e, el) {
  el.classList.remove('drag-over');
}

function dragDrop(e, el) {
  e.stopPropagation();
  e.preventDefault();
  document.querySelectorAll('.q-row').forEach(r => r.classList.remove('drag-over', 'dragging'));
  if (!dragSrc || dragSrc === el) return;
  if (el.dataset.ch  !== dragSrc.dataset.ch  ||
      el.dataset.sec !== dragSrc.dataset.sec ||
      el.dataset.lv  !== dragSrc.dataset.lv) return;

  const ch    = parseInt(dragSrc.dataset.ch);
  const sec   = parseInt(dragSrc.dataset.sec);
  const lv    = parseInt(dragSrc.dataset.lv);
  const srcQi = parseInt(dragSrc.dataset.qi);
  const dstQi = parseInt(el.dataset.qi);

  // 配列を並び替え
  const arr = questionsData.chapters[ch].sections[sec][LEVEL_KEYS[lv]];
  const [removed] = arr.splice(srcQi, 1);
  arr.splice(dstQi, 0, removed);

  // タブ状態を保存してから再描画・復元
  const activeLevels = captureActiveLevels();
  renderSections(currentChapter);
  restoreActiveLevels(activeLevels);
}

function dragEnd() {
  document.querySelectorAll('.q-row').forEach(r => r.classList.remove('drag-over', 'dragging'));
  dragFromHandle = false;
}
